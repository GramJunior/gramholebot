<script type="module">
  // настоящая 3D-физика (cannon-es). Кладём в глобал, чтобы основной скрипт мог использовать.
  try{ const C = await import('https://cdn.jsdelivr.net/npm/cannon-es@0.20.0/dist/cannon-es.js'); window.CANNON = C; }
  catch(e){ console.warn('cannon-es не загрузился — физика fallback', e); }
  window.__cannonDone = true;
</script>
<style>
  :root{
    --ton:#0098EA; --ton-light:#34c2ff; --cyan:#7df9ff;
    --gold:#ffce3a; --danger:#ff4d5e; --violet:#c08bff;
    --text:#eaf4ff; --text-dim:#8aa6c8;
    --panel:rgba(8,20,40,0.88); --panel-border:rgba(52,194,255,0.30);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;height:100%;width:100%;overflow:hidden;
    overscroll-behavior:none;touch-action:none;background:#04060f;color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    user-select:none;-webkit-user-select:none;}
  #c{position:fixed;inset:0;display:block;touch-action:none;}
  #joyBase{position:fixed;width:124px;height:124px;border-radius:50%;
    border:2px solid rgba(155,246,255,0.9);background:rgba(52,194,255,0.14);
    transform:translate(-50%,-50%);opacity:0.8;pointer-events:none;z-index:6;display:none;}
  #joyKnob{position:fixed;width:56px;height:56px;border-radius:50%;
    background:rgba(155,246,255,0.9);box-shadow:0 0 18px rgba(52,194,255,0.9);
    transform:translate(-50%,-50%);opacity:0.8;pointer-events:none;z-index:7;display:none;}

  /* ===== HUD ===== */
  #hud{position:fixed;top:calc(env(safe-area-inset-top)+10px);left:0;right:0;pointer-events:none;z-index:5;}
  #score{position:fixed;left:14px;top:calc(env(safe-area-inset-top)+10px);}
  #timer{position:fixed;left:50%;transform:translateX(-50%);top:calc(env(safe-area-inset-top)+10px);}
  .pill{background:var(--panel);border:1px solid var(--panel-border);border-radius:16px;
    padding:8px 14px;backdrop-filter:blur(6px);box-shadow:0 6px 18px rgba(0,0,0,.35);}
  .pill .lbl{font-size:10px;letter-spacing:.12em;color:var(--text-dim);text-transform:uppercase;}
  .pill .val{font-size:22px;font-weight:800;line-height:1.05;}
  #score .val{color:var(--gold);} #timer .val{color:var(--ton-light);}
  #timer.low .val{color:var(--danger);}
  /* таймер раунда — отдельно, ПОД панелью целей (справа), чтобы не накладывались */
  #timer{position:fixed;right:10px;top:calc(env(safe-area-inset-top)+124px);z-index:6;}
  #growthWrap{position:fixed;left:50%;transform:translateX(-50%);top:calc(env(safe-area-inset-top)+78px);
    width:min(56vw,280px);height:12px;border-radius:10px;background:rgba(255,255,255,.08);border:1px solid var(--panel-border);
    overflow:hidden;z-index:5;pointer-events:none;}
  #growthFill{height:100%;width:0;background:linear-gradient(90deg,var(--ton),var(--ton-light));
    box-shadow:0 0 14px var(--ton);transition:width .12s linear;}
  #tierBadge{position:fixed;left:50%;transform:translateX(-50%);top:calc(env(safe-area-inset-top)+60px);
    font-size:11px;letter-spacing:.14em;color:var(--text-dim);text-transform:uppercase;z-index:5;pointer-events:none;}
  #tierBadge b{color:var(--ton-light);font-size:13px;}
  #buffs{position:fixed;left:14px;top:calc(env(safe-area-inset-top)+66px);display:flex;flex-direction:column;
    gap:6px;z-index:5;pointer-events:none;align-items:flex-start;}
  #goalPanel{position:fixed;right:10px;top:calc(env(safe-area-inset-top)+10px);z-index:6;pointer-events:none;
    background:rgba(6,16,32,.74);border:1px solid var(--panel-border);border-radius:14px;padding:8px 10px;
    display:flex;flex-direction:column;gap:5px;min-width:118px;backdrop-filter:blur(4px);}
  #goalPanel .gp-title{font-size:9px;letter-spacing:.16em;color:var(--text-dim);text-transform:uppercase;text-align:right;}
  #goalPanel .gp-row{display:flex;align-items:center;justify-content:flex-end;gap:7px;font-weight:800;font-size:13px;}
  #goalPanel .gp-row .gp-dot{width:12px;height:12px;border-radius:50%;flex:none;box-shadow:0 0 6px rgba(0,0,0,.4);}
  #goalPanel .gp-row .gp-name{flex:1;text-align:left;color:var(--text);white-space:nowrap;}
  #goalPanel .gp-row .gp-cnt{color:var(--ton-light);font-variant-numeric:tabular-nums;}
  #goalPanel .gp-row.done .gp-cnt{color:#5ff0a8;}
  #goalPanel .gp-row .gp-chk{width:15px;text-align:center;color:#5ff0a8;}
  #goalPanel .gp-row.done{filter:saturate(1.2);}
  .buff{background:var(--panel);border:1px solid var(--panel-border);border-radius:12px;padding:5px 10px;
    font-size:12px;font-weight:700;display:flex;gap:6px;align-items:center;}
  .buff small{color:var(--text-dim);font-weight:600;}

  /* ===== Экраны ===== */
  .screen{position:fixed;inset:0;z-index:20;display:flex;flex-direction:column;align-items:center;
    justify-content:center;text-align:center;padding:24px;gap:16px;
    background:radial-gradient(80% 60% at 50% 25%,rgba(0,152,234,.18),transparent 70%),rgba(4,6,15,.82);
    backdrop-filter:blur(3px);overflow-y:auto;}
  .screen.hidden{display:none;}
  .title{font-size:46px;font-weight:900;letter-spacing:-.02em;line-height:.95;
    background:linear-gradient(180deg,var(--ton-light),var(--ton));-webkit-background-clip:text;
    background-clip:text;color:transparent;filter:drop-shadow(0 4px 20px rgba(0,152,234,.5));}
  .title small{display:block;font-size:16px;letter-spacing:.4em;color:var(--cyan);
    -webkit-text-fill-color:var(--cyan);margin-top:4px;}
  .subtitle{color:var(--text-dim);font-size:14px;max-width:300px;line-height:1.45;}
  .gem-mark{font-size:60px;filter:drop-shadow(0 6px 24px rgba(0,152,234,.6));}
  .who{display:flex;align-items:center;gap:10px;background:var(--panel);border:1px solid var(--panel-border);
    border-radius:999px;padding:6px 14px 6px 6px;}
  .who .ava{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--ton),var(--violet));
    display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;font-size:15px;}
  .who b{font-size:15px;}
  .diff{display:flex;gap:10px;}
  .diff button{pointer-events:auto;cursor:pointer;border:1px solid var(--panel-border);background:var(--panel);
    color:var(--text);border-radius:14px;padding:10px 14px;font-size:13px;font-weight:700;min-width:84px;}
  .diff button.sel{border-color:var(--ton-light);background:rgba(0,152,234,.22);box-shadow:0 0 16px rgba(0,152,234,.4);}
  .diff button small{display:block;color:var(--text-dim);font-weight:600;font-size:10px;margin-top:3px;}
  .row{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;}
  .btn{pointer-events:auto;cursor:pointer;border:none;font-size:18px;font-weight:800;color:#021018;
    padding:15px 38px;border-radius:18px;background:linear-gradient(180deg,var(--ton-light),var(--ton));
    box-shadow:0 8px 24px rgba(0,152,234,.45);transition:transform .08s,filter .08s;}
  .btn:active{transform:scale(.96);filter:brightness(1.05);}
  .btn.ghost{background:var(--panel);border:1px solid var(--panel-border);color:var(--text);box-shadow:none;}
  .final-score{font-size:54px;font-weight:900;color:var(--gold);line-height:1;}
  .final-label{color:var(--text-dim);font-size:13px;letter-spacing:.14em;text-transform:uppercase;}
  .record{color:#fff;font-weight:800;font-size:14px;letter-spacing:.06em;
    background:linear-gradient(90deg,var(--gold),#ff9d3a);padding:6px 16px;border-radius:999px;
    box-shadow:0 6px 18px rgba(255,157,58,.4);}
  .best{color:var(--gold);font-weight:700;}
  .lb{width:100%;max-width:380px;background:var(--panel);border:1px solid var(--panel-border);
    border-radius:18px;padding:8px;display:flex;flex-direction:column;gap:2px;max-height:46vh;overflow-y:auto;}
  .lb-row{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:12px;}
  .lb-row.me{background:rgba(0,152,234,.20);}
  .lb-rank{width:30px;font-weight:800;color:var(--text-dim);text-align:center;}
  .lb-rank.top{color:var(--gold);}
  .lb-name{flex:1;text-align:left;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .lb-pts{color:var(--gold);font-weight:800;}
  .lb-empty{color:var(--text-dim);padding:18px;font-size:14px;}
  .lb-note{color:var(--text-dim);font-size:11px;max-width:380px;line-height:1.4;}
  #verTag{position:fixed;left:8px;bottom:6px;z-index:25;pointer-events:none;
    font-size:10px;letter-spacing:.08em;color:rgba(255,255,255,.45);}
  #loading{position:fixed;inset:0;z-index:30;display:flex;align-items:center;justify-content:center;
    background:#04060f;color:var(--text-dim);font-size:14px;letter-spacing:.1em;padding:24px;text-align:center;}
  @media (prefers-reduced-motion:reduce){#growthFill,.btn{transition:none;}}
</style>
</head>
<body>
  <div id="loading">Загрузка 3D…</div>
  <div id="verTag"></div>
  <canvas id="c"></canvas>

  <div id="hud">
    <div class="pill" id="score"><div class="lbl">Gram</div><div class="val">0</div></div>

  <div id="goalPanel"></div>
  <div id="tierBadge"><b>Уровень 1</b></div>

  <!-- ГЛАВНОЕ МЕНЮ -->
  <div class="screen" id="menuScreen">
    <div class="gem-mark">💎</div>
    <div class="title">TON HOLE<small>3D</small></div>
    <div class="who"><span class="ava" id="whoAva">?</span><b id="whoName">Гость</b></div>
    <div class="subtitle">Веди дыру по полю и зачисти все целевые объекты, пока не вышло время. Ешь мелочь — дыра растёт и сможет проглотить крупное.</div>
    <div class="diff" id="diffPick">
      <div id="levelLabel" style="font-size:18px;font-weight:800;color:var(--ton-light);padding:6px 0;">Уровень 1 <small style="opacity:.6;font-weight:600;">/ 1000</small></div>
    </div>
    <div class="row">
      <button class="btn" id="playBtn">Играть</button>
      <button class="btn ghost" id="rateBtn">Рейтинг</button>
    </div>
    <div class="best" id="menuBest"></div>
  </div>

  <!-- ЭКРАН КОНЦА -->
  <div class="screen hidden" id="overScreen">
    <div class="record" id="recordBadge" style="display:none;">Новый рекорд!</div>
    <div class="final-label" id="overReason">Собрано Gram</div>
    <div class="final-score" id="finalScore">0</div>
    <div class="best" id="overBestLine" style="color:var(--cyan);"></div>
    <div class="row">
      <button class="btn" id="againBtn">Играть снова</button>
      <button class="btn ghost" id="overRateBtn">Рейтинг</button>
    </div>
    <button class="btn ghost" id="overMenuBtn" style="padding:10px 24px;font-size:14px;">В меню</button>
  </div>

  <!-- ЭКРАН РЕЙТИНГА -->
  <div class="screen hidden" id="rateScreen">
    <div class="title" style="font-size:34px;">Рейтинг</div>
    <div class="lb" id="lbList"><div class="lb-empty">Загрузка…</div></div>
    <div class="lb-note" id="lbNote"></div>
    <button class="btn ghost" id="rateBackBtn">Назад</button>
  </div>

<script>
"use strict";
/* =========================================================================
   TON HOLE 3D — Telegram Mini App
   3D «дыра-поглотитель» на Three.js: процедурная карта, многоэтажные здания,
   бонусы, бомба = конец игры, генератор сложности, рейтинг по аккаунту Telegram.
   ========================================================================= */

/* ---------- Конфиг рейтинга ----------
   Пусто = ЛОКАЛЬНЫЙ рейтинг (имя из Telegram, очки на устройстве + сидовые боты).
   Вставь URL своего бесплатного бэкенда (см. leaderboard-worker.js) →
   рейтинг станет ГЛОБАЛЬНЫМ и защищённым (валидация initData по токену бота). */
const CONFIG = { API_BASE: "" };

/* ---------- Telegram ---------- */
const tg = window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp : null;
let TG_USER = null;
if (tg){
  tg.ready(); tg.expand();
  try{ tg.disableVerticalSwipes && tg.disableVerticalSwipes(); }catch(e){}
  TG_USER = (tg.initDataUnsafe && tg.initDataUnsafe.user) || null;
  const tp = tg.themeParams || {};
  const rs = document.documentElement.style;
  if (tp.text_color) rs.setProperty('--text', tp.text_color);
  if (tp.hint_color) rs.setProperty('--text-dim', tp.hint_color);
  try{ tg.setHeaderColor && tg.setHeaderColor('#04060f'); }catch(e){}
  try{ tg.BackButton && tg.BackButton.onClick(()=>goMenu()); }catch(e){}
}
const Haptic = {
  imp(s){ try{ tg&&tg.HapticFeedback&&tg.HapticFeedback.impactOccurred(s); }catch(e){} },
  notify(t){ try{ tg&&tg.HapticFeedback&&tg.HapticFeedback.notificationOccurred(t); }catch(e){} }
};
function displayName(){
  if (TG_USER){
    const n=(TG_USER.first_name||'')+(TG_USER.last_name?' '+TG_USER.last_name:'');
    return n.trim() || ('@'+(TG_USER.username||'player'));
  }
  return 'Гость';
}

/* ---------- Рекорд: CloudStorage → localStorage → память ---------- */
let memBest=0;
const Store={
  lg(){ try{ return parseInt(localStorage.getItem('tonhole3d_best')||'0',10)||0; }catch(e){ return memBest; } },
  ls(v){ try{ localStorage.setItem('tonhole3d_best',String(v)); }catch(e){ memBest=v; } },
  get(cb){ if(tg&&tg.CloudStorage){ tg.CloudStorage.getItem('best',(e,v)=>cb(!e&&v?(parseInt(v,10)||this.lg()):this.lg())); } else cb(this.lg()); },
  set(v){ this.ls(v); if(tg&&tg.CloudStorage){ try{ tg.CloudStorage.setItem('best',String(v),()=>{}); }catch(e){} } }
};

/* ===================== ГЕНЕРАТОР СЛОЖНОСТИ =====================
   Реализованы все три варианта сразу:
   • Пресеты chill/normal/hard (плотность, % бомб, размер карты, высотность, время).
   • Эскалация по «волнам»: каждые wave сек растут бомбы и этажность.
   • Зональность: чем дальше от центра, тем выше здания и ценнее (см. spawnObject).  */
/* ===================== УРОВНИ (план: 1000; сейчас первые 5) ===================== */
const VERSION = '2.15';   // версия сборки (видна в углу меню)
const TOTAL_LEVELS = 1000;          // всего уровней будет 1000 (пока сделаны первые 5)
const LEVELS = [
  // Реальная физика: пол целиком замощён плитками, у ВСЕХ предметов есть тела →
  // карты компактные (помещается дыра до 6-го размера), предметов меньше, но честно падают.
  { map:200, items:90,  bombs:0, time:175, clusters:6,  cRmin:26, cRmax:46, walls:0 },
  { map:225, items:115, bombs:1, time:175, clusters:7,  cRmin:28, cRmax:50, walls:0 },
  { map:250, items:140, bombs:2, time:170, clusters:8,  cRmin:30, cRmax:54, walls:0 },
  { map:275, items:165, bombs:3, time:170, clusters:9,  cRmin:32, cRmax:58, walls:0 },
  { map:300, items:190, bombs:4, time:165, clusters:10, cRmin:34, cRmax:62, walls:0 }
];
let currentLevel=1, D=LEVELS[0];
let lastReason='';

/* ===================== БАЛАНС / МАТЕМАТИКА РОСТА ===================== */
const R0 = 7.0;          // старт дыры (под увеличенное поле)
const GROW = 1.25;       // +25%/уровень — 6 размеров заметно различаются
const MAX_LEVEL = 12;
function levelRadius(L){ return R0 * Math.pow(GROW, Math.min(L,MAX_LEVEL)-1); }   // радиус дыры на уровне L
function stepToNext(L){ return Math.round(12 * Math.pow(1.4, L-1)); }   // мягкий рост порогов (раньше ×2 — рост быстро застревал)
function pointsToLevel(L){ let s=0; for(let i=1;i<L;i++) s+=stepToNext(i); return s; }  // сколько очков до уровня L
// 6 уровней размера предметов. footR — что должно влезть (footR ≤ радиус дыры → нужен тот уровень дыры).
function tierFootR(t){ return t<=1 ? R0*0.78 : levelRadius(t)*0.95; }   // тир t съедается с дыры уровня t
function tierScale(t){ return tierFootR(t)*0.96; }                      // видимый размер предмета
const TIER_VAL=[0,1,2,4,7,11,16];                                       // очки по тиру (индекс = тир)
const VIEW = { SCREEN_Y:-25, FOV:58, TILT:0.34 };
const DEPTH = 14;        // видимая глубина дыры (объект проваливается на столько, темнея)
// Пока — монеты разных ЦВЕТОВ и РАЗМЕРОВ (тикеры экосистемы TON). Позже заменим часть на тематические фигуры.
const TYPES = [
  {id:'ton',   name:'TON',   tier:1, render:'coin', logo:'TON',   bg:'#08233b', fg:'#3aa7ff', edge:0x2a6fae},
  {id:'not',   name:'NOT',   tier:1, render:'coin', logo:'NOT',   bg:'#3a2e08', fg:'#ffce3a', edge:0xb98f1f},
  {id:'dogs',  name:'DOGS',  tier:2, render:'coin', logo:'DOGS',  bg:'#2a2207', fg:'#ffe06a', edge:0xb9a01f},
  {id:'gram',  name:'GRAM',  tier:2, render:'coin', logo:'GRAM',  bg:'#0d3320', fg:'#5ff0a8', edge:0x2a8f5e},
  {id:'cati',  name:'CATI',  tier:3, render:'coin', logo:'CATI',  bg:'#06303a', fg:'#54e6e0', edge:0x1f8f93},
  {id:'hmstr', name:'HMSTR', tier:3, render:'coin', logo:'HMSTR', bg:'#3a1f06', fg:'#ff9d3a', edge:0xb9701f},
  {id:'major', name:'MAJOR', tier:4, render:'coin', logo:'MAJOR', bg:'#3a0d0d', fg:'#ff6a6a', edge:0xb93a3a},
  {id:'ston',  name:'STON',  tier:5, render:'coin', logo:'STON',  bg:'#102a3a', fg:'#7ec8ff', edge:0x3a7fae},
  {id:'grc',   name:'GRC',   tier:6, render:'coin', logo:'GRC',   bg:'#2a0d33', fg:'#d08bff', edge:0x7e3fae}
];
const TYPE_BY_ID={}; TYPES.forEach(t=>{ TYPE_BY_ID[t.id]=t; });
// Супер-предметы (размер тира 1, едятся сразу): часы +20с, статуэтка Дурова +50 очк, магнит — притяжение
const SUPERS = {
  clock:     { icon:'clock',  name:'Часы',      addTime:20 },
  statuette: { icon:'statue', name:'Статуэтка', addScore:50 },
  magnet:    { icon:'magnet', name:'Магнит',    magnet:true }
};

/* ===================== THREE.JS ===================== */
let renderer, scene, camera, ground, holeMesh, holeRing, holeGlow, dirLight, fog, pitWall, pitBottom;
function maskMat(){ const m=new THREE.MeshBasicMaterial(); m.colorWrite=false; m.depthWrite=false; m.depthTest=false;
  m.stencilWrite=true; m.stencilRef=1; m.stencilFunc=THREE.AlwaysStencilFunc; m.stencilZPass=THREE.ReplaceStencilOp; return m; }
function applyGroundStencil(mat){ mat.stencilWrite=true; mat.stencilRef=1; mat.stencilFunc=THREE.NotEqualStencilFunc;
  mat.stencilFail=THREE.KeepStencilOp; mat.stencilZFail=THREE.KeepStencilOp; mat.stencilZPass=THREE.KeepStencilOp; return mat; }
let W=innerWidth, H=innerHeight, DPR=Math.min(devicePixelRatio||1,2);
let ray, groundPlane, tmpV, tmpV2, ndc, GEO, MAT, buildTex, TYPE_RENDER, SUPER_RENDER;
let walls=[];        // ограждения: {x,z,w,d, mesh}

function buildAssets(){
  GEO = {
    gem:  new THREE.OctahedronGeometry(1,0),
    coin: new THREE.CylinderGeometry(1,1,0.5,36),    // монета с ОБЪЁМОМ (толстая, чтобы стопка читалась)
    box:  new THREE.BoxGeometry(1,1,1),
    bomb: new THREE.SphereGeometry(1,12,10),
    ring: new THREE.TorusGeometry(1,0.22,8,28),
    shard:new THREE.TetrahedronGeometry(1,0),
    star: new THREE.IcosahedronGeometry(1,0),
    rock: new THREE.DodecahedronGeometry(1,0),
    boulder:new THREE.IcosahedronGeometry(1,1),       // валун (тир 6) — округлый, много граней
    donut:new THREE.TorusGeometry(0.8,0.32,8,16),
    cone: new THREE.ConeGeometry(0.8,1.8,7),
    egg:  makeEggGeometry(),                          // 3D-яйцо (овоид с сужением кверху)

/* 3D-яйцо: сфера, вытянутая по вертикали и сужённая кверху */
function makeEggGeometry(){
  const g=new THREE.SphereGeometry(1,24,18), pos=g.attributes.position;
  for(let i=0;i<pos.count;i++){
    const y=pos.getY(i); pos.setY(i,y*1.35);
    const t=(y+1)/2, taper=1-0.16*t;                 // верх уже низа → форма яйца
    pos.setX(i,pos.getX(i)*taper); pos.setZ(i,pos.getZ(i)*taper);
  }
  pos.needsUpdate=true; g.computeVertexNormals(); return g;
}

/* ===================== СПАВН ===================== */
function rand(a,b){ return a+Math.random()*(b-a); }
function clamp(v,a,b){ return v<a?a:v>b?b:v; }
function overlaps(x,z,footR){
  // пересекается ли с уже разложенным объектом (по горизонтали) — нельзя «один в одном»
  for(const o of pool){
    if(!o.active) continue;
    if(Math.hypot(o.x-x, o.z-z) < (o.footR+footR)*1.22) return true;   // не «один в одном» — только касание
  }
  return false;
}
function placePos(o, inCluster, fixed){
  if(fixed){ o.x=fixed.x; o.z=fixed.z; return true; }   // элемент стопки — координаты заданы
  for(let tr=0; tr<40; tr++){
    let x,z;
    if(clusters.length && inCluster!==false){
      const c=clusters[Math.floor(Math.random()*clusters.length)];
      const a=rand(0,Math.PI*2), rr=rand(0,c.r);
      x=clamp(c.x+Math.cos(a)*rr, -mapHalf+8, mapHalf-8);
      z=clamp(c.z+Math.sin(a)*rr, -mapHalf+8, mapHalf-8);
    } else {
      x=rand(-mapHalf+8, mapHalf-8); z=rand(-mapHalf+8, mapHalf-8);
    }
    if(insideWall(x,z,4) || Math.hypot(x,z)<R0+10) continue;   // не в стене, не на старте
    if(inCluster===false){                                      // бомбы — не в кучах
      let near=false; for(const c of clusters){ if(Math.hypot(x-c.x,z-c.z)<c.r+26){ near=true; break; } }
      if(near && tr<30) continue;
    }
    if(overlaps(x,z,o.footR) && tr<34) continue;                // не накладываемся на другие
    o.x=x; o.z=z; return true;
  }
  return false;   // не нашли места без пересечения — не плодим «один в одном»
}
/* ---- Ограждения ---- */
function insideWall(x,z,pad){
  for(const w of walls){ if(Math.abs(x-w.x)<w.w+pad && Math.abs(z-w.z)<w.d+pad) return true; }
  return false;
}
function buildWalls(){
  for(const w of walls){ scene.remove(w.mesh); w.mesh.geometry.dispose(); }
  walls=[];
  const n=D.walls||0;
  for(let i=0;i<n;i++){
    const horiz=Math.random()<0.5;
    const len=rand(mapHalf*0.18, mapHalf*0.40), th=rand(2,3);
    const w=horiz?len:th, d=horiz?th:len;
    let x,z,tr=0;
    do{
      x=rand(-mapHalf*0.5,mapHalf*0.5); z=rand(-mapHalf*0.5,mapHalf*0.5); tr++;
      // ближайший край стены должен быть не ближе 42 ед. к точке старта (центру)
      var ex=Math.max(0,Math.abs(x)-w), ez=Math.max(0,Math.abs(z)-d);
    } while(tr<16 && Math.hypot(ex,ez)<42);
    const m=new THREE.Mesh(GEO.box, MAT.fence);
    m.scale.set(w*2, 4, d*2); m.position.set(x,2,z); scene.add(m);
    walls.push({x, z, w, d, mesh:m});
  }
}
function collideWalls(){
  for(const w of walls){
    const cx=clamp(hole.x, w.x-w.w, w.x+w.w);
    const cz=clamp(hole.z, w.z-w.d, w.z+w.d);
    let dx=hole.x-cx, dz=hole.z-cz, dist=Math.hypot(dx,dz);
    if(dist < hole.r){
      if(dist<0.001){ // центр внутри стены — выталкиваем по короткой оси
        const ox=(w.w - Math.abs(hole.x-w.x)), oz=(w.d - Math.abs(hole.z-w.z));
        if(ox<oz){ hole.x = w.x + Math.sign(hole.x-w.x||1)*(w.w+hole.r); }
        else { hole.z = w.z + Math.sign(hole.z-w.z||1)*(w.d+hole.r); }
      } else {
        const push=hole.r-dist;
        hole.x += dx/dist*push; hole.z += dz/dist*push;
      }
    }
  }
}
function spawnObject(kind, arg, opts){
  opts=opts||{};
  const o=freeSlot(); if(!o) return false;
  o.active=true; o.eat=false; o.committed=false; o.kind=kind; o.super=null; o.body=null; o.yOff=(opts.yOff||0);
  // 1) определяем размер (footR) ДО расстановки — нужен для проверки пересечений
  let geo='coin', sc, baseY;
  if(kind==='item'){
    const t = TYPE_BY_ID[arg] || TYPES[0];
    o.type=t.id; o.tier=t.tier; o.val=TIER_VAL[t.tier]; o.footR=tierFootR(t.tier);
    geo=TYPE_RENDER[t.id].geo; sc=tierScale(t.tier);
  } else if(kind==='super'){
    o.super=arg; o.type=null; o.tier=1; o.val=0; o.footR=tierFootR(1);
    geo=SUPER_RENDER[arg].geo; sc=tierScale(1)*1.05;
  } else { // bomb
    o.type=null; o.tier=1; o.val=0; o.footR=tierFootR(1)*1.05;
    geo='bomb'; sc=tierScale(1)*0.8;
  }
  // 2) расстановка (без пересечений), либо фиксированная (стопка)
  if(!placePos(o, kind==='item', opts.fixed)){ o.active=false; return false; }
  // 3) посадка на землю (+ смещение вверх для элемента стопки)
  o.restY = -GEO[geo].boundingBox.min.y * sc + (opts.yOff||0);
  if(kind==='super') o.restY = 1.6;                 // супер парит (обновляется в цикле)
  dress(o);
  o.mesh.position.set(o.x, o.restY, o.z);
  o.shadow.position.set(o.x, 0.04, o.z);
  const sr=Math.max(o.footR*0.95, 1.2);
  o.shadow.scale.set(sr, sr, 1); o.shadow.visible = !(opts.yOff>0);   // тень только под низом стопки
  o.mesh.visible=true;
  return o;
}
function regenMap(){
  for(const o of pool){ if(o.body&&CW){ CW.removeBody(o.body); } o.body=null; o.active=false; o.eat=false; o.committed=false; o.mesh.visible=false; o.shadow.visible=false; }
  buildWalls();
  // ГЕНЕРАТОР РАСКЛАДКИ: предметы ставятся СИММЕТРИЧНЫМИ паттернами (сетка, ряд, башня, кольцо),
  // без наложений (текстура в текстуре). Башни/стопки разрешены (по вертикали).
  clusters=[];
  const byTier={}; TYPES.forEach(t=>{ (byTier[t.tier]=byTier[t.tier]||[]).push(t.id); });
  const TIER_W=[0,60,15,11,7,4,3];
  const counts={}; const countInc=id=>{ counts[id]=(counts[id]||0)+1; };
  const pickTier=()=>{ let r=Math.random()*100,a=0; for(let t=1;t<=6;t++){ a+=TIER_W[t]; if(r<a) return t; } return 1; };
  const lim=mapHalf-8;
  const patterns=[];
  function anchor(rad){
    for(let tr=0;tr<80;tr++){
      const x=rand(-lim,lim), z=rand(-lim,lim);
      if(Math.hypot(x,z) < hole.r+rad+8) continue;            // не на старте дыры
      let ok=true; for(const p of patterns){ if(Math.hypot(p.x-x,p.z-z) < p.r+rad+4){ ok=false; break; } }
      if(ok) return {x,z};
    }
    return null;
  }
  const emit=(id,x,z,yOff)=>{ const o=spawnObject('item',id,{fixed:{x,z},yOff:yOff||0}); if(o) countInc(id); return o; };

  let placed=0, guard=0;
  function placePattern(){
    const t=pickTier(); const id=byTier[t][Math.floor(Math.random()*byTier[t].length)];
    const fr=tierFootR(t), step=fr*2.3;
    const remaining=D.items-placed;
    let pts=[], rad=fr, tower=0; const k=Math.random();
    if(t>=4 || remaining<4){                                   // крупные — одиночки
      pts=[[0,0]];
    } else if(k<0.34){                                         // СЕТКА n×n (3×3, 6×6 …)
      const nn = t<=2 ? (Math.random()<0.5?3:6) : 3;
      const half=(nn-1)/2;
      for(let i=0;i<nn;i++)for(let j=0;j<nn;j++) pts.push([(i-half)*step,(j-half)*step]);
      rad=half*step+fr;
    } else if(k<0.6){                                          // РЯД
      const n=2+Math.floor(Math.random()*5), horiz=Math.random()<0.5, half=(n-1)/2;
      for(let i=0;i<n;i++){ const o=(i-half)*step; pts.push(horiz?[o,0]:[0,o]); }
      rad=half*step+fr;
    } else if(k<0.8 && t<=3){                                  // БАШНЯ (вертикальный стек)
      tower=2+Math.floor(Math.random()*3); pts=[[0,0]];
    } else {                                                   // КОЛЬЦО
      const n=5+Math.floor(Math.random()*4), rr=Math.max(fr*2.2, fr*1.3/Math.sin(Math.PI/n));
      for(let i=0;i<n;i++){ const a=i/n*Math.PI*2; pts.push([Math.cos(a)*rr,Math.sin(a)*rr]); }
      rad=rr+fr;
    }
    if(rad>lim*0.85){ pts=[[0,0]]; rad=fr; tower=0; }
    const a=anchor(rad); if(!a) return false;
    patterns.push({x:a.x,z:a.z,r:rad}); clusters.push({x:a.x,z:a.z,r:rad});
    if(tower>0){ const stepY=fr*0.55; for(let s=0;s<tower;s++){ emit(id,a.x,a.z,s*stepY); placed++; } }
    else { for(const p of pts){ emit(id,a.x+p[0],a.z+p[1]); placed++; } }
    return true;
  }
  while(placed<D.items && guard++<D.items*4){ if(!placePattern()) break; }

  // ЗАПАС ДЛЯ РОСТА: топлива (предметы МЕНЬШЕ самого большого) хватает дорасти на +3 уровня.
  let maxTier=1; Object.keys(counts).forEach(id=>{ maxTier=Math.max(maxTier, TYPE_BY_ID[id].tier); });
  const needFuel=pointsToLevel(Math.min(MAX_LEVEL, maxTier+3));
  const fuelNow=()=>{ let s=0; Object.keys(counts).forEach(id=>{ const t=TYPE_BY_ID[id].tier; if(t<maxTier) s+=TIER_VAL[t]*counts[id]; }); return s; };
  const t1ids=TYPES.filter(t=>t.tier===1).map(t=>t.id);
  let guard2=0;
  while(fuelNow()<needFuel && guard2++<2000){
    const id=t1ids[Math.floor(Math.random()*t1ids.length)];
    const fr=tierFootR(1), step=fr*2.3, nn=3, half=1, rad=half*step+fr;
    const a=anchor(rad); if(!a) break; patterns.push({x:a.x,z:a.z,r:rad}); clusters.push({x:a.x,z:a.z,r:rad});
    for(let i=0;i<nn;i++)for(let j=0;j<nn;j++) emit(id, a.x+(i-half)*step, a.z+(j-half)*step);
  }
  // СУПЕР-предметы: часы 1–3; статуэтка — до 3, каждая с шансом 30%; магнит 1–2
  const clocks=1+Math.floor(Math.random()*3);
  for(let i=0;i<clocks;i++) spawnObject('super','clock');
  for(let i=0;i<3;i++){ if(Math.random()<0.30) spawnObject('super','statuette'); }
  const magnets=1+Math.floor(Math.random()*2);
  for(let i=0;i<magnets;i++) spawnObject('super','magnet');
  // опасности
  for(let i=0;i<D.bombs;i++) spawnObject('bomb');
  // ЦЕЛЬ: 3 случайных типа из присутствующих (с достаточным числом), нужно съесть 70% каждого
  const present=Object.keys(counts).filter(id=>counts[id]>=3);
  for(let i=present.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); const tmp=present[i]; present[i]=present[j]; present[j]=tmp; }
  goalTypes = present.slice(0,3).map(id=>({ type:id, req:Math.max(1,Math.ceil(counts[id]*0.7)), eaten:0 }));
  buildGoalPanel();
}

function startGame(){
  D=LEVELS[Math.min(currentLevel,LEVELS.length)-1]; mapHalf=D.map/2;
  ground.geometry.dispose(); ground.geometry=new THREE.PlaneGeometry(D.map,D.map);
  if(ground.material.map) ground.material.map.dispose();
  ground.material=applyGroundStencil(new THREE.MeshLambertMaterial({map:buildGroundTexture(D.map), color:0xbfe4ff}));

  score=0; elapsed=0; timeLeft=D.time; buffMag=0; buffX2=0;
  hole.level=1; hole.r=R0; hole.grow=0; hole.x=hole.tx=0; hole.z=hole.tz=0;
  camDist=hole.r*7+30; markerPulse=0; joyActive=false; joyDX=0; joyDY=0; joyHide();
  hudScore=hudTime=hudTier=hudGrow=-1; hudBuffKey='';
  regenMap(); updateBuffs();
  if(REAL_PHYS){ clearBodies(); clearColliders(); buildTileVisual(); }   // полная видимая сетка; коллайдеры/тела — лениво у дыры
  els.menu.classList.add('hidden'); els.over.classList.add('hidden'); els.rate.classList.add('hidden');
  try{ tg&&tg.BackButton&&tg.BackButton.hide(); }catch(e){}

function endGame(reason){
  state='over'; lastReason=reason; joyActive=false; joyDX=0; joyDY=0; joyHide();
  Haptic.notify(reason==='win'?'success':(reason==='bomb'?'error':'warning'));
  const rec=score>best; if(rec){ best=score; Store.set(best); }
  els.finalScore.textContent=score;
  els.overReason.textContent = reason==='win' ? ('🎉 Уровень '+currentLevel+' пройден! Gram')
                              : reason==='bomb' ? 'Подорвался! Gram' : 'Не успел! Gram';
  // кнопка: после победы — следующий уровень (если есть), иначе перезапуск
  const nextAvail = currentLevel<LEVELS.length;
  els.again.textContent = reason==='win' ? (nextAvail?'Следующий уровень →':'Молодец! Ещё раз') : 'Заново';
  els.recordBadge.style.display = rec?'':'none';
  els.overBestLine.textContent = (reason==='win'&&!nextAvail) ? 'Это последний из готовых уровней (скоро ещё!)' : ('Твой рекорд: '+best);
  els.over.classList.remove('hidden'); els.goalPanel.style.display='none';
  try{ tg&&tg.BackButton&&tg.BackButton.show(); }catch(e){}
  submitScore(score);
}
function goMenu(){
  state='menu'; refreshLevelLabel();
  els.over.classList.add('hidden'); els.rate.classList.add('hidden'); els.menu.classList.remove('hidden');
  els.menuBest.textContent = best?('Твой рекорд: '+best+' Gram'):'';
  try{ tg&&tg.BackButton&&tg.BackButton.hide(); }catch(e){}
}

/* ===================== ФИЗИКА ПАДЕНИЯ (твёрдое тело) ===================== */
const PHYS = { G:95, REST:0.34, FRIC:0.6, VMAX:130 };   // гравитация (земная по ощущению), упругость, трение→качение, лимит скорости
const _wq=new THREE.Quaternion(), _dq=new THREE.Quaternion();
function integrateSpin(q, wx,wy,wz, h){               // dq/dt = ½ ω⊗q  (кватернионное вращение)
  _wq.set(wx*h, wy*h, wz*h, 0); _dq.copy(_wq).multiply(q);
  q.x+=0.5*_dq.x; q.y+=0.5*_dq.y; q.z+=0.5*_dq.z; q.w+=0.5*_dq.w; q.normalize();
}
function cloneDarkenable(o,m){                         // отдельный материал, чтобы темнить именно этот объект в глубине
  m.material = Array.isArray(m.material) ? m.material.map(x=>x.clone())
                                         : m.material.clone();
  o._mat=true;
}
function startFalling(o){
  const m=o.mesh; o.eat=true; o.committed=false;
  o.px=o.x; o.py=o.restY; o.pz=o.z;
  o.vx=0; o.vy=0; o.vz=0;
  // начальный наклон В сторону дыры (момент от неподпёртого свеса над кромкой)
  let rx=o.x-hole.x, rz=o.z-hole.z, dh=Math.hypot(rx,rz)||1e-4;
  const nx=rx/dh, nz=rz/dh, S=2.6+Math.random()*1.6;
  o.wx=-nz*S; o.wz=nx*S; o.wy=(Math.random()-0.5)*1.5;   // ось наклона ⟂ радиусу → верх валится к центру
  m.rotation.set(0,o.spin,0);                            // синхронизируем кватернион со стартовой позой
}
/* ===================== РЕАЛЬНАЯ ФИЗИКА — ГИБРИД (мелкая видимая сетка + коллайдеры только у дыры) ===================== */
/* Видимая сетка ПОЛНАЯ и мелкая (InstancedMesh, дёшево для GPU). Физические тела-плитки —
   ТОЛЬКО в окне вокруг дыры (там идёт падение): сотни тел вместо десятков тысяч. Внутри окна
   у плиток в круге дыры выключен коллайдер → частичная опора → честное опрокидывание.
   Тела предметов создаются лениво у дыры; ушли — снимаются (ложатся на пол статиком). TN — частота. */
let CW=null, REAL_PHYS=false, gMat=null, oMat=null, TN=112, tileSize=1, tileMesh=null;
const _tileDummy = (typeof THREE!=='undefined') ? new THREE.Object3D() : null;
let colTiles=new Map(), colPool=[], hiddenCells=new Set();
const COL_W=2.6;   // радиус окна коллайдеров ≈ COL_W × радиус дыры (в единицах)
function initPhysics(){
  if(!window.CANNON){ REAL_PHYS=false; return; }
  try{
    CW=new CANNON.World({gravity:new CANNON.Vec3(0,-95,0)});
    CW.broadphase=new CANNON.SAPBroadphase(CW); CW.allowSleep=true; CW.solver.iterations=14;
    gMat=new CANNON.Material('g'); oMat=new CANNON.Material('o');
    CW.addContactMaterial(new CANNON.ContactMaterial(gMat,oMat,{friction:0.5,restitution:0.05}));
    CW.addContactMaterial(new CANNON.ContactMaterial(oMat,oMat,{friction:0.4,restitution:0.05}));
    REAL_PHYS=true;
  }catch(e){ console.warn('initPhysics fail \u2192 fallback', e); CW=null; REAL_PHYS=false; }
}
function buildTileVisual(){                               // ПОЛНАЯ видимая сетка (только картинка, без тел)
  if(!CW) return;
  if(tileMesh){ scene.remove(tileMesh); tileMesh.geometry.dispose(); tileMesh.material.dispose(); tileMesh=null; }
  hiddenCells.clear();
  tileSize=(mapHalf*2)/TN;
  const half=mapHalf, count=TN*TN;
  const geo=new THREE.BoxGeometry(tileSize*0.9,0.4,tileSize*0.9);
  const mat=new THREE.MeshLambertMaterial({color:0x2b3e62});
  tileMesh=new THREE.InstancedMesh(geo,mat,count); tileMesh.frustumCulled=false;
  tileMesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage); scene.add(tileMesh);
  const d=_tileDummy; let k=0;
  for(let i=0;i<TN;i++) for(let j=0;j<TN;j++){
    const x=-half+tileSize*(i+0.5), z=-half+tileSize*(j+0.5);
    d.position.set(x,-0.2,z); d.scale.set(1,1,1); d.updateMatrix(); tileMesh.setMatrixAt(k,d.matrix); k++;
  }
  tileMesh.instanceMatrix.needsUpdate=true;
}
function setTileVisible(k,vis){
  const i=Math.floor(k/TN), j=k%TN, half=mapHalf, x=-half+tileSize*(i+0.5), z=-half+tileSize*(j+0.5), s=vis?1:0.0001;
  _tileDummy.position.set(x,-0.2,z); _tileDummy.scale.set(s,s,s); _tileDummy.updateMatrix(); tileMesh.setMatrixAt(k,_tileDummy.matrix);
}
function updateVisualHole(){                              // прячем КАРТИНКУ клеток в круге дыры (только изменившиеся)
  if(!tileMesh) return;
  const half=mapHalf, R2=hole.r*hole.r;
  const ci=Math.round((hole.x+half)/tileSize-0.5), cj=Math.round((hole.z+half)/tileSize-0.5);
  const W=Math.ceil(hole.r/tileSize)+1; let changed=false;
  for(let i=ci-W;i<=ci+W;i++)for(let j=cj-W;j<=cj+W;j++){
    if(i<0||i>=TN||j<0||j>=TN) continue;
    const cx=-half+tileSize*(i+0.5), cz=-half+tileSize*(j+0.5), k=i*TN+j;
    if((cx-hole.x)*(cx-hole.x)+(cz-hole.z)*(cz-hole.z)<R2 && !hiddenCells.has(k)){ hiddenCells.add(k); setTileVisible(k,false); changed=true; }
  }
  for(const k of hiddenCells){
    const i=Math.floor(k/TN), j=k%TN, cx=-half+tileSize*(i+0.5), cz=-half+tileSize*(j+0.5);
    if((cx-hole.x)*(cx-hole.x)+(cz-hole.z)*(cz-hole.z)>=R2){ hiddenCells.delete(k); setTileVisible(k,true); changed=true; }
  }
  if(changed) tileMesh.instanceMatrix.needsUpdate=true;
}
function colGet(){
  let b=colPool.pop();
  if(!b) b=new CANNON.Body({mass:0,type:CANNON.Body.STATIC,material:gMat,shape:new CANNON.Box(new CANNON.Vec3(tileSize/2,0.2,tileSize/2))});
  return b;
}
function updateColliders(){                               // тела-плитки ТОЛЬКО в окне вокруг дыры
  if(!CW) return;
  const half=mapHalf, R2=hole.r*hole.r;
  const ci=Math.round((hole.x+half)/tileSize-0.5), cj=Math.round((hole.z+half)/tileSize-0.5);
  const W=Math.ceil((hole.r*COL_W)/tileSize)+1;
  for(let i=ci-W;i<=ci+W;i++)for(let j=cj-W;j<=cj+W;j++){
    if(i<0||i>=TN||j<0||j>=TN) continue;
    const k=i*TN+j;
    if(!colTiles.has(k)){ const b=colGet(), x=-half+tileSize*(i+0.5), z=-half+tileSize*(j+0.5);
      b.position.set(x,-0.2,z); b.aabbNeedsUpdate=true; b.collisionResponse=true; b._cx=x; b._cz=z; b._i=i; b._j=j;
      CW.addBody(b); colTiles.set(k,b); }
  }
  for(const [k,b] of colTiles){
    if(b._i<ci-W||b._i>ci+W||b._j<cj-W||b._j>cj+W){ CW.removeBody(b); colPool.push(b); colTiles.delete(k); continue; }
    const dx=b._cx-hole.x, dz=b._cz-hole.z; b.collisionResponse=(dx*dx+dz*dz)>=R2;   // в круге дыры опоры нет
  }
}
function clearColliders(){ if(!CW) return; for(const [,b] of colTiles) CW.removeBody(b); colTiles.clear(); colPool.length=0; }
function makeBody(o){
  const isBomb=o.kind==='bomb';
  const hy=isBomb? o.footR*0.85 : Math.max(0.28,o.footR*0.26), hw=o.footR*0.7;
  const shape = isBomb ? new CANNON.Sphere(o.footR*0.85) : new CANNON.Box(new CANNON.Vec3(hw,hy,hw));
  const vol = isBomb ? (4/3)*Math.PI*Math.pow(o.footR*0.85,3) : (2*hw)*(2*hy)*(2*hw);
  const y0 = (isBomb? o.footR*0.85 : hy)+0.04+(o.yOff||0);   // на полу, как в покое (без «прыжка»)
  const b=new CANNON.Body({ mass:Math.max(0.4, vol*0.3), material:oMat, shape, position:new CANNON.Vec3(o.x,y0,o.z) });
  b.allowSleep=true; b.sleepSpeedLimit=0.15; b.sleepTimeLimit=0.4; b.linearDamping=0.02; b.angularDamping=0.05;
  CW.addBody(b); o.body=b; b.sleep();
}
function dropBody(o,settle){
  if(o.body){ CW.removeBody(o.body); o.body=null; }
  if(settle){ o.mesh.position.set(o.x,o.restY,o.z); o.mesh.rotation.set(0,o.spin,0); o.shadow.position.set(o.x,0.04,o.z); o.shadow.visible=true; }
}
function clearBodies(){ if(!CW) return; for(const o of pool){ if(o.body){ CW.removeBody(o.body); o.body=null; } } }
function teardownPhysics(){ clearBodies(); clearColliders(); if(tileMesh){scene.remove(tileMesh);tileMesh=null;} CW=null; REAL_PHYS=false; }
function stepPhysics(dt){
  updateColliders();
  updateVisualHole();
  for(const o of pool){ if(!o.active) continue;
    const dx=o.x-hole.x, dz=o.z-hole.z, d2=dx*dx+dz*dz;
    if(!o.body && d2 < (hole.r*1.5)*(hole.r*1.5) && o.footR<=hole.r*1.25) makeBody(o);
    if(o.body && d2 < (hole.r+6)*(hole.r+6) && o.body.sleepState!==0) o.body.wakeUp();
  }
  CW.step(1/60, dt, 6);
  for(const o of pool){
    if(!o.active || !o.body) continue;
    const b=o.body, m=o.mesh;
    m.position.copy(b.position); m.quaternion.copy(b.quaternion);
    o.x=b.position.x; o.z=b.position.z;
    if(b.position.y>-1){ o.shadow.position.set(o.x,0.04,o.z); o.shadow.visible=true; } else o.shadow.visible=false;
    if(b.position.y < -DEPTH){
      if(o.kind==='bomb'){ CW.removeBody(b); o.body=null; explode(o); return; }
      CW.removeBody(b); o.body=null; consume(o); continue;
    }
    const ex=o.x-hole.x, ez=o.z-hole.z;                    // ушёл из зоны и стоит → снять тело (ляжет статиком)
    if(ex*ex+ez*ez > (hole.r*2.1)*(hole.r*2.1) && b.position.y>-0.5 && b.velocity.length()<0.7) dropBody(o,true);
  }
}
/* ===================== ОСНОВНОЙ ШАГ ===================== */
function update(dt){
  elapsed+=dt; timeLeft-=dt;
  if(timeLeft<=0){ timeLeft=0; updateHUD(); endGame('time'); return; }
  if(buffMag>0) buffMag-=dt; if(buffX2>0) buffX2-=dt;
  if(markerPulse>0) markerPulse-=dt;

  // движение по джойстику: вектор стика → скорость дыры (экран: вправо=+x, вниз=+z)
  hole.x += joyDX*HOLE_SPEED*dt;
  hole.z += joyDY*HOLE_SPEED*dt;
  hole.x=clamp(hole.x,-mapHalf+hole.r,mapHalf-hole.r);
  hole.z=clamp(hole.z,-mapHalf+hole.r,mapHalf-hole.r);
  collideWalls(); // ограждения — дыра не проходит, игрок обходит

  if(REAL_PHYS){ try{ stepPhysics(dt); }catch(e){ console.warn('phys err → fallback', e); teardownPhysics(); } }
  else
  for(const o of pool){
    if(!o.active) continue;
    const m=o.mesh;

    if(o.eat){
      // === НАСТОЯЩАЯ ФИЗИКА: гравитация + кватернионное вращение + столкновения со стенкой шахты ===
      o.shadow.visible=false;
      const rb=o.footR*0.9;
      const steps=Math.min(5, Math.max(1, Math.ceil(dt/0.009)));   // подшаги — без «протыкания» стенок
      const h=dt/steps;
      for(let s=0;s<steps;s++){
        o.vy -= PHYS.G*h;
        if(o.vy<-PHYS.VMAX) o.vy=-PHYS.VMAX;
        o.px+=o.vx*h; o.py+=o.vy*h; o.pz+=o.vz*h;
        let rx=o.px-hole.x, rz=o.pz-hole.z, dh=Math.hypot(rx,rz)||1e-4;
        const nx=rx/dh, nz=rz/dh;
        // ВОРОНКА/ЧАША: чем глубже — тем сильнее тянет к центру (склон чаши, как в Jelly)
        const depthFrac=Math.min(1, Math.max(0, -o.py/DEPTH));
        if(o.py < 0.1){
          o.vx -= nx*(8 + 34*depthFrac)*h;     // ускорение к оси по склону воронки
          o.vz -= nz*(8 + 34*depthFrac)*h;
        }
        // стенка сужающейся воронки: радиус уменьшается книзу
        const coneR=Math.max(0.5, hole.r*(1 - depthFrac*0.85));
        const lim=Math.max(0.4, coneR-rb*0.5);
        if(o.py<0.1 && dh>lim){
          const pen=dh-lim; o.px-=nx*pen; o.pz-=nz*pen;       // вернуть на склон
          const vn=o.vx*nx+o.vz*nz;
          if(vn>0){ o.vx-=(1+PHYS.REST)*vn*nx; o.vz-=(1+PHYS.REST)*vn*nz; }
          const tx=-nz, tz=nx, vt=o.vx*tx+o.vz*tz;            // трение по касательной → качение
          o.vx-=tx*vt*PHYS.FRIC; o.vz-=tz*vt*PHYS.FRIC;
          o.wx+=(-nz)*(vt*PHYS.FRIC/rb); o.wz+=(nx)*(vt*PHYS.FRIC/rb);
        }
        integrateSpin(m.quaternion, o.wx,o.wy,o.wz, h);
      }
      o.x=o.px; o.z=o.pz; m.position.set(o.px,o.py,o.pz);
      // прошёл обод → «проглочен» (отдельный материал, темнеет в глубине)
      if(!o.committed && o.py<-1.4){ o.committed=true; cloneDarkenable(o,m); }
      if(o.committed){
        const f=Math.max(0,1-dt*2.2);
        (Array.isArray(m.material)?m.material:[m.material]).forEach(x=>{ x.color&&x.color.multiplyScalar(f); x.emissive&&x.emissive.multiplyScalar(f); });
      } else if(o.py>-rb && Math.hypot(o.px-hole.x,o.pz-hole.z) >= hole.r + o.footR*0.6){
        // дыра ушла, объект ещё у поверхности → встаёт обратно (не провалился)
        o.eat=false; o.vx=o.vy=o.vz=o.wx=o.wy=o.wz=0; m.position.set(o.x,o.restY,o.z); m.rotation.set(0,o.spin,0);
        o.shadow.position.set(o.x,0.04,o.z); o.shadow.visible=true; continue;
      }
      if(o.py < -DEPTH){ finishEat(o); }
      continue;
    }

    const d=Math.hypot(o.x-hole.x, o.z-hole.z);
    if(o.kind==='bomb'){ if(d<hole.r*0.9){ explode(o); return; } continue; }          // бомба = конец
    if(o.kind==='super'){ m.rotation.y=elapsed*1.4; o.restY=1.6+Math.sin(elapsed*3)*0.3; } // супер слегка парит/вертится

    // Падает, когда край объекта заходит за обод воронки (свес над пустотой) и он влезает.
    const fits = o.footR <= hole.r;
    if(fits && d < hole.r + o.footR*0.45){ startFalling(o); continue; }
    // лёгкий сбор у кромки (стекание в воронку, как в Jelly) + магнит-бонус (×5)
    if(fits){
      const gatherR = buffMag>0 ? hole.r*5 : hole.r + o.footR*1.1;
      if(d < gatherR){
        const k = buffMag>0 ? dt*6 : dt*2.4;
        o.x += (hole.x-o.x)*Math.min(0.6,k); o.z += (hole.z-o.z)*Math.min(0.6,k);
      }
    }
    // стоит на месте
    m.position.set(o.x, o.restY, o.z);
    o.shadow.position.set(o.x, 0.04, o.z); o.shadow.visible=true;
  }

  // КОНЕЧНЫЙ УРОВЕНЬ: победа — по всем 3 целевым типам съедено ≥ нужного (70%).
  if(goalTypes.length && goalTypes.every(g=>g.eaten>=g.req)){ endGame('win'); return; }

  hole.r += (levelRadius(hole.level)-hole.r)*Math.min(1,dt*6);
  const gpul = 1 + (markerPulse>0?markerPulse*1.5:0);
  holeMesh.position.set(hole.x,0.02,hole.z); holeMesh.scale.set(hole.r,hole.r,1);
  pitWall.position.set(hole.x,-DEPTH/2,hole.z); pitWall.scale.set(hole.r*0.99,DEPTH,hole.r*0.99);
  pitBottom.position.set(hole.x,-DEPTH+0.1,hole.z); pitBottom.scale.set(hole.r*0.98,hole.r*0.98,1);
  holeRing.position.set(hole.x,0.05,hole.z); holeRing.scale.set(hole.r*gpul,hole.r*gpul,1);

  // === Камера: центр дыры ЖЁСТКО на экране (X=0, Y=VIEW.SCREEN_Y) ===
  // Слежение по плоскости мгновенное (дыра не «уплывает»), плавно меняется только зум.
  const SCREEN_Y=VIEW.SCREEN_Y, FOV=VIEW.FOV, TILT=VIEW.TILT;
  camDist += ((hole.r*7+30) - camDist)*Math.min(1, dt*4);     // плавный зум
  const halfFov=FOV*Math.PI/360;
  const alpha=Math.atan((-SCREEN_Y/100)*Math.tan(halfFov));
  const pitchHole=Math.atan2(Math.cos(TILT), Math.sin(TILT));
  const ahead=Math.cos(TILT)/Math.tan(pitchHole-alpha) - Math.sin(TILT);
  camera.position.set(hole.x, Math.cos(TILT)*camDist, hole.z + Math.sin(TILT)*camDist);
  camera.lookAt(hole.x, 0, hole.z - ahead*camDist);

  updateHUD();
}
function finishEat(o){ consume(o); }
function consume(o){
  o.active=false; o.mesh.visible=false; o.shadow.visible=false;
  if(o.kind==='super'){                         // супер-предметы
    const s=SUPERS[o.super]; Haptic.notify('success');
    if(s.addTime){ timeLeft+=s.addTime; }
    else if(s.addScore){ score+=s.addScore; }
    else if(s.magnet){ buffMag=7; updateBuffs(); }
    return;
  }
  const gain=o.val*(buffX2>0?2:1);
  score+=gain; hole.grow+=o.val; markerPulse=0.16;
  // учёт цели: если съеденный тип — один из 3 целевых, увеличиваем счётчик
  const g=goalTypes.find(g=>g.type===o.type);
  if(g){ g.eaten++; if(g.eaten===g.req) Haptic.notify('success'); updateGoalPanel(); }
  Haptic.imp('light');
  while(hole.level<MAX_LEVEL && hole.grow>=stepToNext(hole.level)){
    hole.grow-=stepToNext(hole.level); hole.level++; Haptic.imp('medium');
  }
}
function explode(o){ o.active=false; o.mesh.visible=false; o.shadow.visible=false; endGame('bomb'); }

/* ---------- HUD ---------- */
function updateHUD(){
  if(score!==hudScore){ hudScore=score; els.score.textContent=score; }
  const t=Math.ceil(timeLeft);
  if(t!==hudTime){ hudTime=t; els.timer.textContent=t; els.timerPill.classList.toggle('low',t<=10); }
  if(currentLevel!==hudTier){ hudTier=currentLevel; els.tier.textContent='Уровень '+currentLevel; }
  const need=stepToNext(hole.level);
  const gp=hole.level>=MAX_LEVEL?100:Math.round(hole.grow/need*100);
  if(gp!==hudGrow){ hudGrow=gp; els.grow.style.width=gp+'%'; }
  const key=(buffMag>0?'M'+Math.ceil(buffMag):'')+(buffX2>0?'X'+Math.ceil(buffX2):'');
  if(key!==hudBuffKey){ hudBuffKey=key; updateBuffs(); }
}
function updateBuffs(){
  let h='';
  if(buffMag>0) h+='<div class="buff">🧲 Магнит <small>'+Math.ceil(buffMag)+'с</small></div>';
  if(buffX2>0)  h+='<div class="buff">✨ x2 Gram <small>'+Math.ceil(buffX2)+'с</small></div>';
  els.buffs.innerHTML=h;
}

/* ===================== ЦИКЛ ===================== */
function loop(ts){
  rafId=requestAnimationFrame(loop);
  if(state!=='playing'||paused){ last=ts; return; }
  let dt=(ts-last)/1000; last=ts; if(dt>0.05) dt=0.05;
  update(dt);
  if(state==='playing'){ renderer.render(scene,camera); }
}
document.addEventListener('visibilitychange',()=>{ paused=document.hidden; if(!paused) last=performance.now(); });
window.addEventListener('pagehide',()=>{ if(rafId) cancelAnimationFrame(rafId); });

/* ===================== ВВОД: ВИРТУАЛЬНЫЙ ДЖОЙСТИК ===================== */
// Плавающий джойстик: появляется в точке касания, направление+амплитуда задают скорость дыры.
const JOY_MAX=58;            // макс. ход стика, px
const HOLE_SPEED=40;        // скорость дыры под увеличенное поле
let joyActive=false, joyBX=0, joyBY=0, joyDX=0, joyDY=0;
const joyBase=document.getElementById('joyBase'), joyKnob=document.getElementById('joyKnob');
function joyShow(bx,by,kx,ky){
  joyBase.style.left=bx+'px'; joyBase.style.top=by+'px'; joyBase.style.display='block';
  joyKnob.style.left=kx+'px'; joyKnob.style.top=ky+'px'; joyKnob.style.display='block';
}
function joyHide(){ joyBase.style.display='none'; joyKnob.style.display='none'; }
function joyStart(e){
  if(state!=='playing') return;
  const t=e.touches?e.touches[0]:e;
  try{ if(e.pointerId!=null) cv.setPointerCapture(e.pointerId); }catch(_){}
  joyActive=true; joyBX=t.clientX; joyBY=t.clientY; joyDX=0; joyDY=0;
  joyShow(joyBX,joyBY,joyBX,joyBY);
}
function joyMove(e){
  if(!joyActive) return;
  const t=e.touches?e.touches[0]:e;
  let dx=t.clientX-joyBX, dy=t.clientY-joyBY;
  const len=Math.hypot(dx,dy)||0.0001, cl=Math.min(len,JOY_MAX);
  const ux=dx/len, uy=dy/len;
  joyDX=ux*(cl/JOY_MAX); joyDY=uy*(cl/JOY_MAX);     // ∈[-1..1]
  joyShow(joyBX,joyBY, joyBX+ux*cl, joyBY+uy*cl);
}
function joyEnd(){ joyActive=false; joyDX=0; joyDY=0; joyHide(); }
const cv=document.getElementById('c');
cv.addEventListener('pointerdown',joyStart,{passive:true});
cv.addEventListener('pointermove',joyMove,{passive:true});
cv.addEventListener('pointerup',joyEnd,{passive:true});
cv.addEventListener('pointercancel',joyEnd,{passive:true});

/* ===================== РЕСАЙЗ ===================== */
function resize(){
  W=window.innerWidth;
  H=(tg && tg.viewportHeight) ? Math.round(tg.viewportHeight) : window.innerHeight;
  DPR=Math.min(devicePixelRatio||1,2);
  renderer.setPixelRatio(DPR);
  renderer.setSize(W,H);                 // updateStyle=true → CSS-размер канваса = W×H (не вылезает за экран)
  camera.aspect=W/H; camera.updateProjectionMatrix();
}
window.addEventListener('resize',resize);
window.addEventListener('orientationchange',()=>setTimeout(resize,200));

/* ===================== РЕЙТИНГ ===================== */
async function submitScore(sc){
  if(!CONFIG.API_BASE){
    try{
      const me=displayName();
      const list=JSON.parse(localStorage.getItem('tonhole3d_lb')||'[]');
      const i=list.findIndex(r=>r.name===me);
      if(i>=0){ if(sc>list[i].score) list[i].score=sc; } else list.push({name:me,score:sc});
      localStorage.setItem('tonhole3d_lb',JSON.stringify(list));
    }catch(e){}
    return;
  }
  try{
    await fetch(CONFIG.API_BASE.replace(/\/$/,'')+'/score',{
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({ initData: tg?tg.initData:'', score: sc })
    });
  }catch(e){}
}
async function loadLeaderboard(){
  els.lbList.innerHTML='<div class="lb-empty">Загрузка…</div>';
  let rows=[], note='', myName=displayName();
  if(!CONFIG.API_BASE){
    note='Локальный рейтинг (на этом устройстве). Чтобы включить общий — подключите бесплатный бэкенд (см. инструкцию).';
    let list=[]; try{ list=JSON.parse(localStorage.getItem('tonhole3d_lb')||'[]'); }catch(e){}
    const seed=[['Алмазный Кит',4200],['CryptoLama',3100],['TON Мастер',2450],['Gram Hunter',1700],['Новичок',640]];
    for(const s of seed) if(!list.find(r=>r.name===s[0])) list.push({name:s[0],score:s[1]});
    rows=list.sort((a,b)=>b.score-a.score).slice(0,20);
  } else {
    try{
      const r=await fetch(CONFIG.API_BASE.replace(/\/$/,'')+'/top?initData='+encodeURIComponent(tg?tg.initData:''));
      const j=await r.json(); rows=j.top||[]; myName=j.me||myName; note='Общий рейтинг всех игроков.';
    }catch(e){ note='Не удалось загрузить общий рейтинг.'; }
  }
  if(!rows.length){ els.lbList.innerHTML='<div class="lb-empty">Пока пусто — сыграй первым!</div>'; }
  else{
    els.lbList.innerHTML=rows.map(function(r,i){
      const me=r.name===myName?' me':'';
      const top=i<3?' top':'';
      const medal=i===0?'🥇':i===1?'🥈':i===2?'🥉':(i+1);
      return '<div class="lb-row'+me+'"><div class="lb-rank'+top+'">'+medal+'</div>'+
             '<div class="lb-name">'+escapeHtml(r.name)+'</div><div class="lb-pts">'+r.score+'</div></div>';
    }).join('');
  }
  els.lbNote.textContent=note;
}
function escapeHtml(s){ return String(s).replace(/[&<>"']/g,function(c){
  return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]; }); }

/* ===================== КНОПКИ ===================== */
function refreshLevelLabel(){
  const el=document.getElementById('levelLabel');
  if(el) el.innerHTML='Уровень '+currentLevel+' <small style="opacity:.6;font-weight:600;">/ '+TOTAL_LEVELS+'</small>';
}
document.getElementById('playBtn').addEventListener('click',()=>{ Haptic.imp('light'); startGame(); });
document.getElementById('againBtn').addEventListener('click',()=>{
  Haptic.imp('light');
  if(lastReason==='win' && currentLevel<LEVELS.length) currentLevel++;   // победа → следующий уровень (пока есть)
  startGame();
});
document.getElementById('overMenuBtn').addEventListener('click',goMenu);
function showRate(){ els.menu.classList.add('hidden'); els.over.classList.add('hidden');
  els.rate.classList.remove('hidden'); try{tg&&tg.BackButton&&tg.BackButton.show();}catch(e){} loadLeaderboard(); }
document.getElementById('rateBtn').addEventListener('click',showRate);
document.getElementById('overRateBtn').addEventListener('click',showRate);
document.getElementById('rateBackBtn').addEventListener('click',goMenu);

/* ===================== СТАРТ ===================== */
function boot(){
  if(!window.THREE){ els.loading.textContent='Не удалось загрузить 3D (Three.js). Проверьте интернет и перезапустите.'; return; }
  let waited=0;
  (function wait(){
    if(window.__cannonDone || waited>3500){ start(); }
    else { waited+=50; setTimeout(wait,50); }
  })();
}
function start(){
  initScene();
  resize();
  try{ tg && tg.onEvent && tg.onEvent('viewportChanged', ()=>resize()); }catch(e){}
  setTimeout(resize,150); setTimeout(resize,500); setTimeout(resize,1200);  // догоняем разворот вьюпорта Telegram
  els.whoName.textContent=displayName();
  els.whoAva.textContent=(displayName()[0]||'?').toUpperCase();
  document.getElementById('verTag').textContent='v'+VERSION+(REAL_PHYS?'':' (физика fallback)');
  refreshLevelLabel();
  Store.get(b=>{ best=b; els.menuBest.textContent=b?('Твой рекорд: '+b+' Gram'):''; });
  els.loading.style.display='none';
  last=performance.now();
  rafId=requestAnimationFrame(loop);
}
boot();
</script>
