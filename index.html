<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>TON Hole 3D</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<!-- Three.js r128 (глобальный THREE, без модулей — проще для одного файла) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
  :root{
    --ton:#0098EA; --ton-light:#34c2ff; --cyan:#7df9ff;
    --gold:#ffce3a; --danger:#ff4d5e; --violet:#c08bff;
    --text:#eaf4ff; --text-dim:#8aa6c8;
    --panel:rgba(8,20,40,0.88); --panel-border:rgba(52,194,255,0.30);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;height:100%;width:100%;overflow:hidden;
    overscroll-behavior:none;touch-action:none;background:#04060f;color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    user-select:none;-webkit-user-select:none;}
  #c{position:fixed;inset:0;display:block;touch-action:none;}

  /* ===== HUD ===== */
  #hud{position:fixed;top:0;left:0;right:0;padding:calc(env(safe-area-inset-top)+10px) 14px 0;
    display:flex;align-items:flex-start;justify-content:space-between;pointer-events:none;z-index:5;}
  .pill{background:var(--panel);border:1px solid var(--panel-border);border-radius:16px;
    padding:8px 14px;backdrop-filter:blur(6px);box-shadow:0 6px 18px rgba(0,0,0,.35);}
  .pill .lbl{font-size:10px;letter-spacing:.12em;color:var(--text-dim);text-transform:uppercase;}
  .pill .val{font-size:22px;font-weight:800;line-height:1.05;}
  #score .val{color:var(--gold);} #timer .val{color:var(--ton-light);}
  #timer.low .val{color:var(--danger);}
  #growthWrap{position:fixed;left:14px;right:14px;bottom:calc(env(safe-area-inset-bottom)+14px);
    height:14px;border-radius:10px;background:rgba(255,255,255,.08);border:1px solid var(--panel-border);
    overflow:hidden;z-index:5;pointer-events:none;}
  #growthFill{height:100%;width:0;background:linear-gradient(90deg,var(--ton),var(--ton-light));
    box-shadow:0 0 14px var(--ton);transition:width .12s linear;}
  #tierBadge{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(env(safe-area-inset-bottom)+34px);
    font-size:11px;letter-spacing:.14em;color:var(--text-dim);text-transform:uppercase;z-index:5;pointer-events:none;}
  #tierBadge b{color:var(--ton-light);font-size:13px;}
  #buffs{position:fixed;right:14px;top:calc(env(safe-area-inset-top)+64px);display:flex;flex-direction:column;
    gap:6px;z-index:5;pointer-events:none;align-items:flex-end;}
  .buff{background:var(--panel);border:1px solid var(--panel-border);border-radius:12px;padding:5px 10px;
    font-size:12px;font-weight:700;display:flex;gap:6px;align-items:center;}
  .buff small{color:var(--text-dim);font-weight:600;}

  /* ===== Экраны ===== */
  .screen{position:fixed;inset:0;z-index:20;display:flex;flex-direction:column;align-items:center;
    justify-content:center;text-align:center;padding:24px;gap:16px;
    background:radial-gradient(80% 60% at 50% 25%,rgba(0,152,234,.18),transparent 70%),rgba(4,6,15,.82);
    backdrop-filter:blur(3px);overflow-y:auto;}
  .screen.hidden{display:none;}
  .title{font-size:46px;font-weight:900;letter-spacing:-.02em;line-height:.95;
    background:linear-gradient(180deg,var(--ton-light),var(--ton));-webkit-background-clip:text;
    background-clip:text;color:transparent;filter:drop-shadow(0 4px 20px rgba(0,152,234,.5));}
  .title small{display:block;font-size:16px;letter-spacing:.4em;color:var(--cyan);
    -webkit-text-fill-color:var(--cyan);margin-top:4px;}
  .subtitle{color:var(--text-dim);font-size:14px;max-width:300px;line-height:1.45;}
  .gem-mark{font-size:60px;filter:drop-shadow(0 6px 24px rgba(0,152,234,.6));}
  .who{display:flex;align-items:center;gap:10px;background:var(--panel);border:1px solid var(--panel-border);
    border-radius:999px;padding:6px 14px 6px 6px;}
  .who .ava{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--ton),var(--violet));
    display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;font-size:15px;}
  .who b{font-size:15px;}
  .diff{display:flex;gap:10px;}
  .diff button{pointer-events:auto;cursor:pointer;border:1px solid var(--panel-border);background:var(--panel);
    color:var(--text);border-radius:14px;padding:10px 14px;font-size:13px;font-weight:700;min-width:84px;}
  .diff button.sel{border-color:var(--ton-light);background:rgba(0,152,234,.22);box-shadow:0 0 16px rgba(0,152,234,.4);}
  .diff button small{display:block;color:var(--text-dim);font-weight:600;font-size:10px;margin-top:3px;}
  .row{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;}
  .btn{pointer-events:auto;cursor:pointer;border:none;font-size:18px;font-weight:800;color:#021018;
    padding:15px 38px;border-radius:18px;background:linear-gradient(180deg,var(--ton-light),var(--ton));
    box-shadow:0 8px 24px rgba(0,152,234,.45);transition:transform .08s,filter .08s;}
  .btn:active{transform:scale(.96);filter:brightness(1.05);}
  .btn.ghost{background:var(--panel);border:1px solid var(--panel-border);color:var(--text);box-shadow:none;}
  .final-score{font-size:54px;font-weight:900;color:var(--gold);line-height:1;}
  .final-label{color:var(--text-dim);font-size:13px;letter-spacing:.14em;text-transform:uppercase;}
  .record{color:#fff;font-weight:800;font-size:14px;letter-spacing:.06em;
    background:linear-gradient(90deg,var(--gold),#ff9d3a);padding:6px 16px;border-radius:999px;
    box-shadow:0 6px 18px rgba(255,157,58,.4);}
  .best{color:var(--gold);font-weight:700;}
  .lb{width:100%;max-width:380px;background:var(--panel);border:1px solid var(--panel-border);
    border-radius:18px;padding:8px;display:flex;flex-direction:column;gap:2px;max-height:46vh;overflow-y:auto;}
  .lb-row{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:12px;}
  .lb-row.me{background:rgba(0,152,234,.20);}
  .lb-rank{width:30px;font-weight:800;color:var(--text-dim);text-align:center;}
  .lb-rank.top{color:var(--gold);}
  .lb-name{flex:1;text-align:left;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .lb-pts{color:var(--gold);font-weight:800;}
  .lb-empty{color:var(--text-dim);padding:18px;font-size:14px;}
  .lb-note{color:var(--text-dim);font-size:11px;max-width:380px;line-height:1.4;}
  #loading{position:fixed;inset:0;z-index:30;display:flex;align-items:center;justify-content:center;
    background:#04060f;color:var(--text-dim);font-size:14px;letter-spacing:.1em;padding:24px;text-align:center;}
  @media (prefers-reduced-motion:reduce){#growthFill,.btn{transition:none;}}
</style>
</head>
<body>
  <div id="loading">Загрузка 3D…</div>
  <canvas id="c"></canvas>

  <div id="hud">
    <div class="pill" id="score"><div class="lbl">Gram</div><div class="val">0</div></div>
    <div class="pill" id="timer"><div class="lbl">Время</div><div class="val">60</div></div>
  </div>
  <div id="buffs"></div>
  <div id="tierBadge">Масштаб <b>1</b></div>
  <div id="growthWrap"><div id="growthFill"></div></div>

  <!-- ГЛАВНОЕ МЕНЮ -->
  <div class="screen" id="menuScreen">
    <div class="gem-mark">💎</div>
    <div class="title">TON HOLE<small>3D</small></div>
    <div class="who"><span class="ava" id="whoAva">?</span><b id="whoName">Гость</b></div>
    <div class="subtitle">Управляй чёрной дырой, поглощай гемы, монеты Gram и целые здания. Расти — глотай больше. Поймал бомбу — конец.</div>
    <div class="diff" id="diffPick">
      <button data-d="chill">Лёгкий<small>спокойно</small></button>
      <button data-d="normal" class="sel">Норма<small>баланс</small></button>
      <button data-d="hard">Хард<small>хаос</small></button>
    </div>
    <div class="row">
      <button class="btn" id="playBtn">Играть</button>
      <button class="btn ghost" id="rateBtn">Рейтинг</button>
    </div>
    <div class="best" id="menuBest"></div>
  </div>

  <!-- ЭКРАН КОНЦА -->
  <div class="screen hidden" id="overScreen">
    <div class="record" id="recordBadge" style="display:none;">Новый рекорд!</div>
    <div class="final-label" id="overReason">Собрано Gram</div>
    <div class="final-score" id="finalScore">0</div>
    <div class="best" id="overBestLine" style="color:var(--cyan);"></div>
    <div class="row">
      <button class="btn" id="againBtn">Играть снова</button>
      <button class="btn ghost" id="overRateBtn">Рейтинг</button>
    </div>
    <button class="btn ghost" id="overMenuBtn" style="padding:10px 24px;font-size:14px;">В меню</button>
  </div>

  <!-- ЭКРАН РЕЙТИНГА -->
  <div class="screen hidden" id="rateScreen">
    <div class="title" style="font-size:34px;">Рейтинг</div>
    <div class="lb" id="lbList"><div class="lb-empty">Загрузка…</div></div>
    <div class="lb-note" id="lbNote"></div>
    <button class="btn ghost" id="rateBackBtn">Назад</button>
  </div>

<script>
"use strict";
/* =========================================================================
   TON HOLE 3D — Telegram Mini App
   3D «дыра-поглотитель» на Three.js: процедурная карта, многоэтажные здания,
   бонусы, бомба = конец игры, генератор сложности, рейтинг по аккаунту Telegram.
   ========================================================================= */

/* ---------- Конфиг рейтинга ----------
   Пусто = ЛОКАЛЬНЫЙ рейтинг (имя из Telegram, очки на устройстве + сидовые боты).
   Вставь URL своего бесплатного бэкенда (см. leaderboard-worker.js) →
   рейтинг станет ГЛОБАЛЬНЫМ и защищённым (валидация initData по токену бота). */
const CONFIG = { API_BASE: "" };

/* ---------- Telegram ---------- */
const tg = window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp : null;
let TG_USER = null;
if (tg){
  tg.ready(); tg.expand();
  try{ tg.disableVerticalSwipes && tg.disableVerticalSwipes(); }catch(e){}
  TG_USER = (tg.initDataUnsafe && tg.initDataUnsafe.user) || null;
  const tp = tg.themeParams || {};
  const rs = document.documentElement.style;
  if (tp.text_color) rs.setProperty('--text', tp.text_color);
  if (tp.hint_color) rs.setProperty('--text-dim', tp.hint_color);
  try{ tg.setHeaderColor && tg.setHeaderColor('#04060f'); }catch(e){}
  try{ tg.BackButton && tg.BackButton.onClick(()=>goMenu()); }catch(e){}
}
const Haptic = {
  imp(s){ try{ tg&&tg.HapticFeedback&&tg.HapticFeedback.impactOccurred(s); }catch(e){} },
  notify(t){ try{ tg&&tg.HapticFeedback&&tg.HapticFeedback.notificationOccurred(t); }catch(e){} }
};
function displayName(){
  if (TG_USER){
    const n=(TG_USER.first_name||'')+(TG_USER.last_name?' '+TG_USER.last_name:'');
    return n.trim() || ('@'+(TG_USER.username||'player'));
  }
  return 'Гость';
}

/* ---------- Рекорд: CloudStorage → localStorage → память ---------- */
let memBest=0;
const Store={
  lg(){ try{ return parseInt(localStorage.getItem('tonhole3d_best')||'0',10)||0; }catch(e){ return memBest; } },
  ls(v){ try{ localStorage.setItem('tonhole3d_best',String(v)); }catch(e){ memBest=v; } },
  get(cb){ if(tg&&tg.CloudStorage){ tg.CloudStorage.getItem('best',(e,v)=>cb(!e&&v?(parseInt(v,10)||this.lg()):this.lg())); } else cb(this.lg()); },
  set(v){ this.ls(v); if(tg&&tg.CloudStorage){ try{ tg.CloudStorage.setItem('best',String(v),()=>{}); }catch(e){} } }
};

/* ===================== ГЕНЕРАТОР СЛОЖНОСТИ =====================
   Реализованы все три варианта сразу:
   • Пресеты chill/normal/hard (плотность, % бомб, размер карты, высотность, время).
   • Эскалация по «волнам»: каждые wave сек растут бомбы и этажность.
   • Зональность: чем дальше от центра, тем выше здания и ценнее (см. spawnObject).  */
const DIFFS = {
  chill:  { map:200, gems:34, builds:18, bombs:3, bombMax:6,  time:70, maxFoot:2, maxFloors:6,  bonus:0.16, wave:14 },
  normal: { map:240, gems:42, builds:26, bombs:5, bombMax:11, time:60, maxFoot:3, maxFloors:9,  bonus:0.12, wave:11 },
  hard:   { map:280, gems:50, builds:34, bombs:8, bombMax:18, time:55, maxFoot:3, maxFloors:14, bonus:0.09, wave:8  }
};
let diffKey='normal', D=DIFFS.normal;

/* ===================== БАЛАНС ===================== */
const HOLE_R    = [4, 6.5, 10, 14.5, 20, 27];
const GROW_NEED = [10, 18, 30, 46, 66];
const MAX_TIER  = HOLE_R.length-1;
const FOOT_R    = [1.6, 4.5, 8, 13];
const TYPES = { ton:{c:0x34c2ff,val:1}, cyan:{c:0x7df9ff,val:1}, violet:{c:0xc08bff,val:2}, gram:{c:0xffce3a,val:3} };
const BONUSES = {
  magnet:{c:0x34c2ff, t:7}, time:{c:0x7df9ff, t:0}, x2:{c:0xffce3a, t:9}, grow:{c:0xc08bff, t:0}
};

/* ===================== THREE.JS ===================== */
let renderer, scene, camera, ground, holeMesh, holeRing, dirLight, fog;
let W=innerWidth, H=innerHeight, DPR=Math.min(devicePixelRatio||1,2);
let ray, groundPlane, tmpV, tmpV2, ndc, GEO, MAT, buildTex;

function buildAssets(){
  GEO = {
    gem:  new THREE.OctahedronGeometry(1,0),
    coin: new THREE.CylinderGeometry(1,1,0.4,12),
    box:  new THREE.BoxGeometry(1,1,1),
    bomb: new THREE.SphereGeometry(1,12,10),
    ring: new THREE.TorusGeometry(1,0.16,8,28)
  };
  const cv=document.createElement('canvas'); cv.width=cv.height=64; const x=cv.getContext('2d');
  x.fillStyle='#0c2238'; x.fillRect(0,0,64,64);
  for(let i=0;i<8;i++)for(let j=0;j<8;j++){ x.fillStyle=Math.random()>0.45?'#1b4e7a':'#34c2ff';
    x.globalAlpha=Math.random()>0.5?0.9:0.4; x.fillRect(i*8+1.5,j*8+1.5,5,5); }
  x.globalAlpha=1;
  buildTex=new THREE.CanvasTexture(cv); buildTex.wrapS=buildTex.wrapT=THREE.RepeatWrapping;

  MAT = {
    gem:  { ton:new THREE.MeshBasicMaterial({color:TYPES.ton.c}), cyan:new THREE.MeshBasicMaterial({color:TYPES.cyan.c}),
            violet:new THREE.MeshBasicMaterial({color:TYPES.violet.c}), gram:new THREE.MeshBasicMaterial({color:TYPES.gram.c}) },
    build:new THREE.MeshLambertMaterial({map:buildTex, color:0x9fd0ff}),
    bomb: new THREE.MeshLambertMaterial({color:0x2a2f3a, emissive:0x661018}),
    bonus:{ magnet:new THREE.MeshBasicMaterial({color:BONUSES.magnet.c}), time:new THREE.MeshBasicMaterial({color:BONUSES.time.c}),
            x2:new THREE.MeshBasicMaterial({color:BONUSES.x2.c}), grow:new THREE.MeshBasicMaterial({color:BONUSES.grow.c}) },
    ring: new THREE.MeshBasicMaterial({color:0x7df9ff})
  };
}
function buildGroundTexture(size){
  const cv=document.createElement('canvas'); cv.width=cv.height=256; const x=cv.getContext('2d');
  x.fillStyle='#061427'; x.fillRect(0,0,256,256);
  x.strokeStyle='rgba(52,194,255,0.22)'; x.lineWidth=2;
  for(let i=0;i<=8;i++){ const p=i*32; x.beginPath();x.moveTo(p,0);x.lineTo(p,256);x.moveTo(0,p);x.lineTo(256,p);x.stroke(); }
  x.fillStyle='rgba(0,152,234,0.06)';
  for(let i=0;i<6;i++) x.fillRect(Math.random()*220,Math.random()*220,30,30);
  const t=new THREE.CanvasTexture(cv); t.wrapS=t.wrapT=THREE.RepeatWrapping; t.repeat.set(size/16,size/16); return t;
}
function initScene(){
  ray=new THREE.Raycaster(); groundPlane=new THREE.Plane(new THREE.Vector3(0,1,0),0);
  tmpV=new THREE.Vector3(); tmpV2=new THREE.Vector3(); ndc=new THREE.Vector2();

  renderer=new THREE.WebGLRenderer({canvas:document.getElementById('c'), antialias:DPR<2, powerPreference:'high-performance'});
  renderer.setPixelRatio(DPR); renderer.setSize(W,H,false);
  scene=new THREE.Scene();
  scene.background=new THREE.Color(0x04060f);
  fog=new THREE.FogExp2(0x04060f,0.0065); scene.fog=fog;
  camera=new THREE.PerspectiveCamera(58, W/H, 1, 700);

  scene.add(new THREE.AmbientLight(0x6688bb,0.9));
  dirLight=new THREE.DirectionalLight(0xddeeff,1.0); dirLight.position.set(40,80,30); scene.add(dirLight);

  buildAssets();

  ground=new THREE.Mesh(new THREE.PlaneGeometry(DIFFS.normal.map,DIFFS.normal.map),
                        new THREE.MeshLambertMaterial({map:buildGroundTexture(DIFFS.normal.map), color:0xbfe4ff}));
  ground.rotation.x=-Math.PI/2; scene.add(ground);

  holeMesh=new THREE.Mesh(new THREE.CircleGeometry(1,40), new THREE.MeshBasicMaterial({color:0x010409}));
  holeMesh.rotation.x=-Math.PI/2; holeMesh.position.y=0.05; scene.add(holeMesh);
  holeRing=new THREE.Mesh(GEO.ring, MAT.ring); holeRing.rotation.x=-Math.PI/2; holeRing.position.y=0.12; scene.add(holeRing);

  buildPools();
}

/* ===================== ПУЛЫ ===================== */
const POOL_SIZE=130;
let pool=[];
function buildPools(){
  pool=[];
  for(let i=0;i<POOL_SIZE;i++){
    const m=new THREE.Mesh(GEO.gem, MAT.gem.ton); m.visible=false; scene.add(m);
    pool.push({mesh:m, active:false, kind:'gem', footTier:0, floors:1, type:'ton', bonus:null,
               val:0, grow:0, eat:false, x:0, z:0, spin:Math.random()*6});
  }
}
function freeSlot(){ for(const o of pool) if(!o.active) return o; return null; }
function dress(o){
  const m=o.mesh;
  if(o.kind==='gem'){
    if(o.type==='gram'){ m.geometry=GEO.coin; m.material=MAT.gem.gram; m.scale.set(1.4,1.4,1.4); }
    else { m.geometry=GEO.gem; m.material=MAT.gem[o.type]; m.scale.set(1.5,1.5,1.5); }
  } else if(o.kind==='build'){
    m.geometry=GEO.box; m.material=MAT.build;
    const w=FOOT_R[o.footTier]*1.3, h=o.floors*2.0; m.scale.set(w,h,w);
  } else if(o.kind==='bomb'){
    m.geometry=GEO.bomb; m.material=MAT.bomb; m.scale.set(1.7,1.7,1.7);
  } else if(o.kind==='bonus'){
    m.geometry=GEO.gem; m.material=MAT.bonus[o.bonus]; m.scale.set(1.7,1.7,1.7);
  }
}

/* ===================== СОСТОЯНИЕ ===================== */
const hole={ x:0,z:0, tx:0,tz:0, r:HOLE_R[0], tier:0, grow:0 };
let state='menu', score=0, best=0, timeLeft=0, elapsed=0, mapHalf=120;
let buffMag=0, buffX2=0;
let rafId=null, last=0, paused=false;
let hudScore=-1,hudTime=-1,hudTier=-1,hudGrow=-1,hudBuffKey='';

const els={
  loading:document.getElementById('loading'),
  score:document.querySelector('#score .val'), timer:document.querySelector('#timer .val'),
  timerPill:document.getElementById('timer'), grow:document.getElementById('growthFill'),
  tier:document.querySelector('#tierBadge b'), buffs:document.getElementById('buffs'),
  menu:document.getElementById('menuScreen'), over:document.getElementById('overScreen'),
  rate:document.getElementById('rateScreen'),
  finalScore:document.getElementById('finalScore'), recordBadge:document.getElementById('recordBadge'),
  overReason:document.getElementById('overReason'), overBestLine:document.getElementById('overBestLine'),
  menuBest:document.getElementById('menuBest'), lbList:document.getElementById('lbList'),
  lbNote:document.getElementById('lbNote'), whoName:document.getElementById('whoName'),
  whoAva:document.getElementById('whoAva')
};

/* ===================== СПАВН ===================== */
function rand(a,b){ return a+Math.random()*(b-a); }
function clamp(v,a,b){ return v<a?a:v>b?b:v; }
function placePos(o){
  let x,z,tr=0;
  do{ x=rand(-mapHalf+8,mapHalf-8); z=rand(-mapHalf+8,mapHalf-8); tr++; }
  while(tr<8 && Math.hypot(x-hole.x,z-hole.z) < hole.r+18);
  o.x=x; o.z=z;
}
function spawnObject(kind, bonusKey){
  const o=freeSlot(); if(!o) return;
  o.active=true; o.eat=false; o.kind=kind; o.bonus=null;
  placePos(o);
  const distFactor=Math.min(1, Math.hypot(o.x,o.z)/mapHalf);
  if(kind==='gem'){
    const keys=Object.keys(TYPES); o.type=keys[Math.floor(rand(0,keys.length-0.001))];
    o.footTier=0; o.floors=1; o.grow=2; o.val=2*TYPES[o.type].val;
    dress(o); o.mesh.position.set(o.x,1.2,o.z);
  } else if(kind==='build'){
    const wave=Math.floor(elapsed/D.wave);
    const maxFoot=Math.min(FOOT_R.length-1, D.maxFoot);
    o.footTier=clamp(Math.round(distFactor*maxFoot + (Math.random()<0.3?1:0)),0,maxFoot);
    o.floors=clamp(Math.round(rand(2,D.maxFloors)*(0.5+distFactor*0.6)+wave*0.5),2,D.maxFloors+wave);
    o.grow=(o.footTier+1)*o.floors; o.val=(o.footTier+2)*o.floors;
    dress(o); o.mesh.position.set(o.x,o.floors*1.0,o.z);
  } else if(kind==='bomb'){
    o.footTier=0; o.floors=1; o.grow=0; o.val=0;
    dress(o); o.mesh.position.set(o.x,1.6,o.z);
  } else if(kind==='bonus'){
    o.bonus=bonusKey; o.footTier=0; o.floors=1; o.grow=0; o.val=0;
    dress(o); o.mesh.position.set(o.x,1.6,o.z);
  }
  o.mesh.visible=true;
}
function countKind(k){ let n=0; for(const o of pool) if(o.active&&o.kind===k&&!o.eat) n++; return n; }
function countBonus(){ let n=0; for(const o of pool) if(o.active&&o.kind==='bonus'&&!o.eat) n++; return n; }
function regenMap(){
  for(const o of pool){ o.active=false; o.eat=false; o.mesh.visible=false; }
  for(let i=0;i<D.gems;i++) spawnObject('gem');
  for(let i=0;i<D.builds;i++) spawnObject('build');
  for(let i=0;i<D.bombs;i++) spawnObject('bomb');
}

/* ===================== ЖИЗНЕННЫЙ ЦИКЛ ===================== */
function startGame(){
  D=DIFFS[diffKey]; mapHalf=D.map/2;
  ground.geometry.dispose(); ground.geometry=new THREE.PlaneGeometry(D.map,D.map);
  if(ground.material.map) ground.material.map.dispose();
  ground.material=new THREE.MeshLambertMaterial({map:buildGroundTexture(D.map), color:0xbfe4ff});

  score=0; elapsed=0; timeLeft=D.time; buffMag=0; buffX2=0;
  hole.tier=0; hole.r=HOLE_R[0]; hole.grow=0; hole.x=hole.tx=0; hole.z=hole.tz=0;
  hudScore=hudTime=hudTier=hudGrow=-1; hudBuffKey='';
  regenMap(); updateBuffs();
  els.menu.classList.add('hidden'); els.over.classList.add('hidden'); els.rate.classList.add('hidden');
  try{ tg&&tg.BackButton&&tg.BackButton.hide(); }catch(e){}
  state='playing'; last=performance.now(); paused=false;
}
function endGame(reason){
  state='over'; Haptic.notify(reason==='bomb'?'error':'warning');
  const rec=score>best; if(rec){ best=score; Store.set(best); }
  els.finalScore.textContent=score;
  els.overReason.textContent = reason==='bomb' ? 'Подорвался! Gram' : 'Время вышло! Gram';
  els.recordBadge.style.display = rec?'':'none';
  els.overBestLine.textContent = 'Твой рекорд: '+best;
  els.over.classList.remove('hidden');
  try{ tg&&tg.BackButton&&tg.BackButton.show(); }catch(e){}
  submitScore(score);
}
function goMenu(){
  state='menu';
  els.over.classList.add('hidden'); els.rate.classList.add('hidden'); els.menu.classList.remove('hidden');
  els.menuBest.textContent = best?('Твой рекорд: '+best+' Gram'):'';
  try{ tg&&tg.BackButton&&tg.BackButton.hide(); }catch(e){}
}

/* ===================== UPDATE ===================== */
function update(dt){
  elapsed+=dt; timeLeft-=dt;
  if(timeLeft<=0){ timeLeft=0; updateHUD(); endGame('time'); return; }
  if(buffMag>0) buffMag-=dt; if(buffX2>0) buffX2-=dt;

  const k=1-Math.exp(-9*dt);
  hole.x+=(hole.tx-hole.x)*k; hole.z+=(hole.tz-hole.z)*k;
  hole.x=clamp(hole.x,-mapHalf+hole.r,mapHalf-hole.r);
  hole.z=clamp(hole.z,-mapHalf+hole.r,mapHalf-hole.r);

  const pullR = buffMag>0 ? hole.r*4.5 : hole.r;
  for(const o of pool){
    if(!o.active) continue;
    o.spin+=dt; const m=o.mesh;
    if(o.eat){
      m.position.x+=(hole.x-m.position.x)*Math.min(1,dt*10);
      m.position.z+=(hole.z-m.position.z)*Math.min(1,dt*10);
      m.position.y-=dt*(hole.r*1.5+12);
      m.scale.multiplyScalar(1-dt*3);
      m.rotation.y+=dt*8;
      if(m.position.y<-2 || m.scale.x<0.06){ finishEat(o); }
      continue;
    }
    const d=Math.hypot(o.x-hole.x, o.z-hole.z);
    if(o.kind==='gem') m.rotation.y=o.spin;
    if(o.kind==='bomb'){ m.rotation.y=o.spin*0.5; if(d<hole.r*0.85){ explode(o); return; } continue; }
    if(o.kind==='bonus'){ m.rotation.y=o.spin*2; m.position.y=1.6+Math.sin(o.spin*3)*0.5; }

    const edible = o.footTier<=hole.tier;
    if(edible && d<pullR){
      if(buffMag>0 && d>hole.r){
        o.x+=(hole.x-o.x)*Math.min(1,dt*4); o.z+=(hole.z-o.z)*Math.min(1,dt*4);
        m.position.x=o.x; m.position.z=o.z;
      } else { o.eat=true; }
    } else if(!edible && d<hole.r+FOOT_R[o.footTier]){
      const p=(hole.r+FOOT_R[o.footTier]-d)/(d||1);
      o.x+=(o.x-hole.x)*p*0.5; o.z+=(o.z-hole.z)*p*0.5;
      o.x=clamp(o.x,-mapHalf,mapHalf); o.z=clamp(o.z,-mapHalf,mapHalf);
      m.position.x=o.x; m.position.z=o.z;
    }
  }

  const wave=Math.floor(elapsed/D.wave);
  const wantBombs=Math.min(D.bombMax, D.bombs+wave);
  while(countKind('gem')   < D.gems)    spawnObject('gem');
  while(countKind('build') < D.builds)  spawnObject('build');
  while(countKind('bomb')  < wantBombs) spawnObject('bomb');
  if(countBonus()<1 && Math.random()<D.bonus*dt*3){
    const keys=Object.keys(BONUSES); spawnObject('bonus', keys[Math.floor(rand(0,keys.length-0.001))]);
  }

  hole.r += (HOLE_R[hole.tier]-hole.r)*Math.min(1,dt*6);
  holeMesh.position.set(hole.x,0.05,hole.z); holeMesh.scale.set(hole.r,hole.r,1);
  holeRing.position.set(hole.x,0.12,hole.z); holeRing.scale.set(hole.r,hole.r,hole.r);

  const camH=hole.r*2.4+26, camB=hole.r*1.8+20;
  tmpV.set(hole.x, camH, hole.z+camB);
  camera.position.lerp(tmpV, 1-Math.exp(-5*dt));
  camera.lookAt(hole.x, 0, hole.z-hole.r*0.6);

  updateHUD();
}
function finishEat(o){ if(o.kind==='bonus') activateBonus(o); else consume(o); }
function consume(o){
  const gain=o.val*(buffX2>0?2:1);
  score+=gain; hole.grow+=o.grow;
  Haptic.imp('light'); o.active=false; o.mesh.visible=false;
  if(hole.tier<MAX_TIER && hole.grow>=GROW_NEED[hole.tier]){ hole.grow=0; hole.tier++; Haptic.imp('medium'); }
}
function explode(o){ o.active=false; o.mesh.visible=false; endGame('bomb'); }
function activateBonus(o){
  const b=o.bonus; Haptic.imp('medium'); o.active=false; o.mesh.visible=false;
  if(b==='magnet') buffMag=BONUSES.magnet.t;
  else if(b==='x2') buffX2=BONUSES.x2.t;
  else if(b==='time') timeLeft+=8;
  else if(b==='grow'){ if(hole.tier<MAX_TIER){ hole.tier++; hole.grow=0; } else hole.grow=GROW_NEED[MAX_TIER-1]; }
  updateBuffs();
}

/* ---------- HUD ---------- */
function updateHUD(){
  if(score!==hudScore){ hudScore=score; els.score.textContent=score; }
  const t=Math.ceil(timeLeft);
  if(t!==hudTime){ hudTime=t; els.timer.textContent=t; els.timerPill.classList.toggle('low',t<=10); }
  if(hole.tier!==hudTier){ hudTier=hole.tier; els.tier.textContent=hole.tier+1; }
  const need=GROW_NEED[Math.min(hole.tier,GROW_NEED.length-1)];
  const gp=hole.tier>=MAX_TIER?100:Math.round(hole.grow/need*100);
  if(gp!==hudGrow){ hudGrow=gp; els.grow.style.width=gp+'%'; }
  const key=(buffMag>0?'M'+Math.ceil(buffMag):'')+(buffX2>0?'X'+Math.ceil(buffX2):'');
  if(key!==hudBuffKey){ hudBuffKey=key; updateBuffs(); }
}
function updateBuffs(){
  let h='';
  if(buffMag>0) h+='<div class="buff">🧲 Магнит <small>'+Math.ceil(buffMag)+'с</small></div>';
  if(buffX2>0)  h+='<div class="buff">✨ x2 Gram <small>'+Math.ceil(buffX2)+'с</small></div>';
  els.buffs.innerHTML=h;
}

/* ===================== ЦИКЛ ===================== */
function loop(ts){
  rafId=requestAnimationFrame(loop);
  if(state!=='playing'||paused){ last=ts; return; }
  let dt=(ts-last)/1000; last=ts; if(dt>0.05) dt=0.05;
  update(dt);
  if(state==='playing'){ holeRing.rotation.z+=dt*1.5; renderer.render(scene,camera); }
}
document.addEventListener('visibilitychange',()=>{ paused=document.hidden; if(!paused) last=performance.now(); });
window.addEventListener('pagehide',()=>{ if(rafId) cancelAnimationFrame(rafId); });

/* ===================== ВВОД ===================== */
let down=false;
function setTarget(e){
  const t=e.touches?e.touches[0]:e;
  ndc.x=(t.clientX/W)*2-1; ndc.y=-(t.clientY/H)*2+1;
  ray.setFromCamera(ndc,camera);
  if(ray.ray.intersectPlane(groundPlane,tmpV2)){ hole.tx=tmpV2.x; hole.tz=tmpV2.z; }
}
const cv=document.getElementById('c');
cv.addEventListener('pointerdown',e=>{ down=true; setTarget(e); },{passive:true});
cv.addEventListener('pointermove',e=>{ if(down) setTarget(e); },{passive:true});
cv.addEventListener('pointerup',()=>{ down=false; },{passive:true});
cv.addEventListener('pointercancel',()=>{ down=false; },{passive:true});

/* ===================== РЕСАЙЗ ===================== */
function resize(){
  W=innerWidth; H=innerHeight; DPR=Math.min(devicePixelRatio||1,2);
  renderer.setPixelRatio(DPR); renderer.setSize(W,H,false);
  camera.aspect=W/H; camera.updateProjectionMatrix();
}
window.addEventListener('resize',resize);

/* ===================== РЕЙТИНГ ===================== */
async function submitScore(sc){
  if(!CONFIG.API_BASE){
    try{
      const me=displayName();
      const list=JSON.parse(localStorage.getItem('tonhole3d_lb')||'[]');
      const i=list.findIndex(r=>r.name===me);
      if(i>=0){ if(sc>list[i].score) list[i].score=sc; } else list.push({name:me,score:sc});
      localStorage.setItem('tonhole3d_lb',JSON.stringify(list));
    }catch(e){}
    return;
  }
  try{
    await fetch(CONFIG.API_BASE.replace(/\/$/,'')+'/score',{
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({ initData: tg?tg.initData:'', score: sc })
    });
  }catch(e){}
}
async function loadLeaderboard(){
  els.lbList.innerHTML='<div class="lb-empty">Загрузка…</div>';
  let rows=[], note='', myName=displayName();
  if(!CONFIG.API_BASE){
    note='Локальный рейтинг (на этом устройстве). Чтобы включить общий — подключите бесплатный бэкенд (см. инструкцию).';
    let list=[]; try{ list=JSON.parse(localStorage.getItem('tonhole3d_lb')||'[]'); }catch(e){}
    const seed=[['Алмазный Кит',4200],['CryptoLama',3100],['TON Мастер',2450],['Gram Hunter',1700],['Новичок',640]];
    for(const s of seed) if(!list.find(r=>r.name===s[0])) list.push({name:s[0],score:s[1]});
    rows=list.sort((a,b)=>b.score-a.score).slice(0,20);
  } else {
    try{
      const r=await fetch(CONFIG.API_BASE.replace(/\/$/,'')+'/top?initData='+encodeURIComponent(tg?tg.initData:''));
      const j=await r.json(); rows=j.top||[]; myName=j.me||myName; note='Общий рейтинг всех игроков.';
    }catch(e){ note='Не удалось загрузить общий рейтинг.'; }
  }
  if(!rows.length){ els.lbList.innerHTML='<div class="lb-empty">Пока пусто — сыграй первым!</div>'; }
  else{
    els.lbList.innerHTML=rows.map(function(r,i){
      const me=r.name===myName?' me':'';
      const top=i<3?' top':'';
      const medal=i===0?'🥇':i===1?'🥈':i===2?'🥉':(i+1);
      return '<div class="lb-row'+me+'"><div class="lb-rank'+top+'">'+medal+'</div>'+
             '<div class="lb-name">'+escapeHtml(r.name)+'</div><div class="lb-pts">'+r.score+'</div></div>';
    }).join('');
  }
  els.lbNote.textContent=note;
}
function escapeHtml(s){ return String(s).replace(/[&<>"']/g,function(c){
  return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]; }); }

/* ===================== КНОПКИ ===================== */
document.getElementById('diffPick').addEventListener('click',function(e){
  const b=e.target.closest('button[data-d]'); if(!b) return;
  diffKey=b.dataset.d; Haptic.imp('light');
  document.querySelectorAll('#diffPick button').forEach(x=>x.classList.toggle('sel',x===b));
});
document.getElementById('playBtn').addEventListener('click',()=>{ Haptic.imp('light'); startGame(); });
document.getElementById('againBtn').addEventListener('click',()=>{ Haptic.imp('light'); startGame(); });
document.getElementById('overMenuBtn').addEventListener('click',goMenu);
function showRate(){ els.menu.classList.add('hidden'); els.over.classList.add('hidden');
  els.rate.classList.remove('hidden'); try{tg&&tg.BackButton&&tg.BackButton.show();}catch(e){} loadLeaderboard(); }
document.getElementById('rateBtn').addEventListener('click',showRate);
document.getElementById('overRateBtn').addEventListener('click',showRate);
document.getElementById('rateBackBtn').addEventListener('click',goMenu);

/* ===================== СТАРТ ===================== */
function boot(){
  if(!window.THREE){ els.loading.textContent='Не удалось загрузить 3D (Three.js). Проверьте интернет и перезапустите.'; return; }
  initScene();
  resize();
  els.whoName.textContent=displayName();
  els.whoAva.textContent=(displayName()[0]||'?').toUpperCase();
  Store.get(b=>{ best=b; els.menuBest.textContent=b?('Твой рекорд: '+b+' Gram'):''; });
  els.loading.style.display='none';
  last=performance.now();
  rafId=requestAnimationFrame(loop);
}
boot();
</script>
